    .fab-reset-session {

    }

    @media (max-width: 480px) {
        .fab-reset-session {

            right: auto;

        .fab-reset-session:hover {

        .fab-activity-log {

        .fab-activity-log:hover {

<script type="text/javascript">
function resetSession() {
    if (confirm("세션을 초기화하시겠습니까? 로그인 정보 및 진행 데이터가 모두 삭제됩니다.")) {
        const userId = sessionStorage.getItem("user-id") || "guest";
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && (key.includes("_" + userId) || key.startsWith("kimp_"))) {
                keysToRemove.push(key);
            }
        }
        keysToRemove.forEach(key => localStorage.removeItem(key));
        
        if (typeof window.addAppLog === 'function') {
            window.addAppLog("세션을 초기화(로그아웃) 하였습니다.");
        }
        
        sessionStorage.clear();
        alert("세션이 초기화되었습니다. 페이지를 새로고침합니다.");
        window.location.reload();
    }
}

$(document).ready(function(){
    // Check logged in status for header display
    const userJson = sessionStorage.getItem("user");
    if (userJson) {
        const user = JSON.parse(userJson);
        // Replace profile icon with a small round profile picture if exists, else name/default icon
        if (user.picture) {
            $(".h-open-btn").html('<img src="' + user.picture + '" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ffffff; object-fit: cover; vertical-align: middle;" alt="' + user.name + '" />');
        } else {
            $(".h-open-btn").html('<span style="font-size:13px; font-weight:bold; color:#ffffff; background-color:#03C75A; padding:4px 8px; border-radius:12px;">' + user.name + '</span>');
        }
        if (user.name === '최현일' || 
            user.email === 'tt2t2am1118@naver.com' || 
            user.role === 'MANAGER' || 
            user.email === 'manager' ||
            (user.email && user.email.toLowerCase().includes('manager')) ||
            (user.name && user.name.toLowerCase().includes('manager'))) {
            $("#fab-manager-console").css("display", "flex");
            $("#fab-manager-console").css("transform", "translateX(-50%)");
        } else {
            $("#fab-manager-console").hide();
        }
    } else {
        $("#fab-manager-console").hide();
    }

    function checkLoginAndRedirect(targetUrl) {
        const user = sessionStorage.getItem("user");
        if (!user) {
            alert("로그인이 필요합니다. 로그인 페이지로 이동합니다.");
            window.location.href = "./login.html";
            return false;
        }
        if (targetUrl) {
            window.location.href = targetUrl;
        }
        return true;
    }

    $(".box").click(function(e){
        e.preventDefault();
        e.stopPropagation();
        var targetHref = $(this).attr("href");
        if (targetHref && targetHref.indexOf("kimp.html") !== -1) {
            checkLoginAndRedirect(targetHref);
        }
    });

    $(".comment a").click(function(e){
        e.preventDefault();
        e.stopPropagation();
    });

    $(".t-com").click(function(e){
        e.preventDefault();
        e.stopPropagation();
    });
    
    // 프로필 버튼 클릭 시 로그인 페이지로 전환
    $(".h-open-btn").click(function(e) {
        e.stopPropagation();
        location.href = "./login.html";
    });
});
</script>
