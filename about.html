<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/explore.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>About Us</title>
    <style>
        .header {
            padding-top: 15px;
            padding-bottom: 15px;
            justify-content: flex-end;
            background-color: var(--var-bg-color);
        }
        .close-btn {
            margin-right: 15px;
            cursor: pointer;
        }
        .main {
            padding-top: 110px;
        }
        .content-padding {
            padding: 20px;
            line-height: 1.6;
        }
        .content-padding h2 {
            margin-top: 0;
            color: white;
            font-size: 20px;
        }
        .content-padding p {
            color: #bbbbbb;
            font-size: 15px;
        }

        /* Github Card Design */
        .github-card {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            color: #212529;
            margin: 20px auto;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .github-header {
            margin-bottom: 15px;
        }
        .github-btn {
            background-color: #24292e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }
        .github-btn:hover {
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div class="header-wrap">
        <div class="header menu-bar mypage">
            <div class="close-btn" onclick="location.href='settings.html'">
                <i class="bi bi-x-lg" style="font-size: 24px; color: #76769e;"></i>
            </div>
        </div>

        <div class="tabs">
            <ul class="tab-list">
                <li class="tab-item active" data-target="privacy">개인정보 처리방침</li>
                <li class="tab-item" data-target="github">Github 주소</li>
            </ul>
        </div>
    </div>
    
    <div class="main-wrap">
        <main class="main">
            <div class="content-area">
                <section class="tab-content active">
                    <div class="slider-box">
                        <div class="content-padding">
                            <h2>개인정보 처리방침</h2>
                            <p>스마트팩토리 앱의 개인정보 처리방침입니다. 회원의 개인정보는 안전하게 보호되며, 관련 법령을 준수합니다.</p>
                            <br>
                            <p>1. 수집하는 개인정보 항목<br>
                                - 아이디, 비밀번호, 이메일 등
                            </p>
                        </div>
                    </div>
                </section>
                <section class="tab-content">
                    <div class="slider-box">
                        <div class="content-padding">
                            <div class="github-card">
                                <div class="github-header">
                                    <i class="bi bi-info-circle-fill" style="color: #6c757d; margin-right: 5px;"></i>
                                    <span style="color: #6c757d; font-weight: bold; font-size: 14px;">시스템 제작 정보</span>
                                </div>
                                <div class="github-title" style="font-size: 22px; font-weight: bold; margin: 15px 0;">
                                    Smart Factory HMI Project
                                </div>
                                <button class="github-btn" onclick="window.open('https://github.com/infott2t/smartFactory-ex', '_blank')">
                                    <i class="bi bi-github" style="font-size: 20px; margin-right: 8px;"></i>
                                    GitHub 저장소 방문하기
                                </button>
                                <div class="github-footer" style="margin-top: 25px; color: #6c757d; font-size: 14px; line-height: 1.6;">
                                    본 프로젝트는 스마트 팩토리 공정 관리를 위한<br>오픈소스 HMI 웹 터미널입니다.<br>
                                    <span style="font-weight: bold; color: #6c757d;">Developed by infott2t</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="./js/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            // Tab Click Logic
            $(document).on('click', '.tab-list .tab-item', function () {
                let currentIndex = $('.tab-list .tab-item.active').index();
                let targetIndex = $(this).index();

                if (currentIndex === targetIndex) return;

                let moveDirection = targetIndex > currentIndex ? 'move-next' : 'move-prev';

                $('.tab-item').removeClass('active');
                $(this).addClass('active');

                let $targetTab = $('.tab-content').eq(targetIndex);

                $('.tab-content').removeClass('active move-next move-prev');
                $targetTab.addClass('active ' + moveDirection);
            });
            
            // Initial Tab Selection from URL
            const urlParams = new URLSearchParams(window.location.search);
            const tabParam = urlParams.get('tab');
            if(tabParam === 'github') {
                $('.tab-list .tab-item').eq(1).click();
            }

            // Swipe / Drag Logic
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            
            $('.content-area').on('touchstart', function(e) {
                startX = e.originalEvent.touches[0].clientX;
                currentX = startX;
                isDragging = true;
                $('.tab-content.active .slider-box').css('transition', 'none');
            });

            $('.content-area').on('touchmove', function(e) {
                if (!isDragging) return;
                currentX = e.originalEvent.touches[0].clientX;
                let diffX = currentX - startX;
                let currentIndex = $('.tab-list .tab-item.active').index();
                
                // Add friction if dragging out of bounds
                if (currentIndex === 0 && diffX > 0) {
                    diffX = diffX * 0.2;
                } else if (currentIndex === 1 && diffX < 0) {
                    diffX = diffX * 0.2;
                }
                
                // Scale visual movement to 50%
                let moveX = diffX * 0.5; 
                
                $('.tab-content.active .slider-box').css('transform', `translateX(${moveX}px)`);
                
                // Animate tab indicator in the opposite direction
                let tabMoveX = -diffX * 0.5; // Opposite direction
                $('.tab-item.active').css('--line-offset', `${tabMoveX}px`);
            });

            $('.content-area').on('touchend', function(e) {
                if (!isDragging) return;
                isDragging = false;
                
                let diffX = currentX - startX;
                let currentIndex = $('.tab-list .tab-item.active').index();
                let screenWidth = window.innerWidth;
                let threshold = screenWidth * 0.45;
                
                $('.tab-content.active .slider-box').css({
                    'transition': 'transform 0.3s ease-out',
                    'transform': 'translateX(0)'
                });
                
                // Snap back the tab indicator
                $('.tab-item.active').addClass('snap-back').css('--line-offset', '0px');
                
                if (Math.abs(diffX) >= threshold) {
                    if (currentIndex === 0 && diffX < 0) {
                        setTimeout(() => $('.tab-list .tab-item').eq(1).click(), 50);
                    } else if (currentIndex === 1 && diffX > 0) {
                        setTimeout(() => $('.tab-list .tab-item').eq(0).click(), 50);
                    }
                }
                
                // Clean up inline styles after transition
                setTimeout(() => {
                    $('.slider-box').css({'transition': '', 'transform': ''});
                    $('.tab-item').removeClass('snap-back').css('--line-offset', '');
                }, 300);
            });
        });
    </script>
</body>
</html>
