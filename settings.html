<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/mypage.css?v=1.0.1">
    <link rel="stylesheet" href="./css/settings.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="./js/auth.js" type="text/javascript"></script>
    <script src="./js/auth-guard.js" type="text/javascript"></script>
    <script src="./js/store.js" type="text/javascript"></script>
    <script src="./js/engine.js" type="text/javascript"></script>
    <title>Settings | 스마트팩토리</title>
</head>
<body>
    <div class="main-wrap settings-wrap">
        <main class="main-settings">
            <!-- Header -->
            <div class="fixed-header-wrap">
                <div class="menu-bar mypage">
                    <div onclick="location.href='mypage2.html'" style="cursor: pointer;">
                        <i class="bi bi-chevron-left back"></i><span>Settings</span>
                    </div>
                </div>
            </div>

            <div class="padding-15"></div>

            <div class="settings-container">
                <div class="settings-title">회원정보 수정</div>
                <div class="settings-box">
                    <div class="settings-item" onclick="location.href='change_password.html'">
                        <span>비밀번호 변경</span>
                    </div>
                    <div class="settings-item" onclick="location.href='account_info.html'">
                        <span>계좌 정보 확인 및 변경</span>
                    </div>
                    <div class="settings-item" onclick="location.href='health_cert.html'" style="display: flex; align-items: center;">
                        <span>보건증 올리기</span>
                        <span id="health-cert-badge" class="badge"></span>
                    </div>
                </div>
            </div>

            <div class="settings-container">
                <div class="settings-title">About Us</div>
                <div class="settings-box">
                    <div class="settings-item" onclick="location.href='about.html'">
                        <span>개인정보 처리방침</span>
                    </div>
                    <div class="settings-item" onclick="location.href='about.html?tab=github'">
                        <span>github 주소</span>
                    </div>
                </div>
            </div>

            <div class="logout-container">
                <button class="logout-btn" onclick="resetSession()">로그아웃</button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let profile = JSON.parse(sessionStorage.getItem("kimp_worker_profile")) || {};
            let status = profile.healthCertificateStatus;
            
            const badge = document.getElementById('health-cert-badge');
            if (badge) {
                if (status === 'approved') {
                    badge.innerText = '인증 완료';
                    badge.className = 'badge badge-approved';
                } else if (status === 'pending') {
                    badge.innerText = '사진 심사중';
                    badge.className = 'badge badge-pending';
                } else {
                    badge.innerText = '심사 필요';
                    badge.className = 'badge badge-needed';
                }
            }
        });

        function resetSession() {
            if (confirm("로그아웃 하시겠습니까?")) {
                if (typeof FactoryStore !== 'undefined') {
                    FactoryStore.dispatch({ type: 'RESET_ALL_DATA' });
                }
                sessionStorage.clear();
                window.location.href = "./login.html";
            }
        }
    </script>
</body>
</html>
