                    <div class="box-corp res-date-box">

                      <img class="icon" src="./images/k-icon_150x150.png">

            <!-- Simulation and Logout -->

                <div class="sim-group">
                    <label>김치만들기 근무시간 조정</label>

                        <button class="sim-btn" onclick="setWorkedHours(0)">0시간 (김수민)</button>
                        <button class="sim-btn" onclick="setWorkedHours(22)">22시간 (최수아)</button>
                        <button class="sim-btn" onclick="setWorkedHours(45)">45시간 (김영희)</button>
                        <button class="sim-btn" onclick="setWorkedHours(133)">133시간 (최현일)</button>
                    </div>
                </div>
                <div class="sim-group">
                    <label>보건증 승인 여부</label>
                    <div class="sim-flex">
                        <button class="sim-btn" onclick="setHealthStatus(null)">미등록/보건증 필요</button>
                        <button class="sim-btn" onclick="setHealthStatus('approved')">보건증 승인완료</button>
                    </div>

                <button type="button" class="btn-logout-mypage" onclick="resetSession()">세션 초기화 및 로그아웃</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/simulator.js" type="text/javascript"></script>
    <script>
        let currentUser = null;
        let workerProfile = null;

        // Load initial user session
        $(document).ready(function () {
            // Back Navigation
            $('.bi-chevron-left.back').click(function () {
                window.location.href = './main.html';
            });

            // Initialize user details
            initUserSession();
        });

        function initUserSession() {
            currentUser = window.AuthManager ? window.AuthManager.getCurrentUser() : null;
            if (!currentUser) {
                const userJson = sessionStorage.getItem("user");
                if (userJson) {
                    currentUser = JSON.parse(userJson);
                }
            }
            if (!currentUser) {
                alert("로그인이 필요합니다.");
                window.location.href = "./login.html";
                return;
            }

            // Render basic profile info
            $('#user-name-display').text(currentUser.name + ' 님');
            $('#user-email-display').text(currentUser.email);

            // Avatar initials
            const initials = currentUser.name ? currentUser.name.substring(0, 2) : 'US';
            $('#user-avatar-initials').text(initials);

            // Fetch worker profile (Kimchi making)
            let profileStr = sessionStorage.getItem("kimp_worker_profile");
            if (profileStr) {
                workerProfile = JSON.parse(profileStr);
            } else {
                workerProfile = getDefaultProfileByName(currentUser.name);
                sessionStorage.setItem("kimp_worker_profile", JSON.stringify(workerProfile));
            }

            // Sync with FactoryStore
            if (FactoryStore.getState().workedHours === 0 && workerProfile.workedHours > 0) {
                FactoryStore.dispatch({ type: 'SET_WORKED_HOURS', payload: workerProfile.workedHours });
            }

            if (FactoryStore.getState().history.length === 0) {
                const defaultHistory = getDefaultHistoryByName(currentUser.name);
                FactoryStore.dispatch({ type: 'SET_HISTORY', payload: defaultHistory });
            }



            if (FactoryStore.getState().udonHours === 0) {
                let defH = 0;
                if (currentUser.name === '최현일') defH = 150;
                else if (currentUser.name === '최수아') defH = 40;
                else if (currentUser.name === '김수민') defH = 5;
                else if (currentUser.name === '김영희') defH = 35;
                FactoryStore.dispatch({ type: 'SET_UDON_HOURS', payload: defH });
            }

            if (FactoryStore.getState().walletHours === 0) {
                let defH = 0;
                if (currentUser.name === '최현일') defH = 125;
                else if (currentUser.name === '최수아') defH = 10;
                else if (currentUser.name === '김수민') defH = 0;
                else if (currentUser.name === '김영희') defH = 30;
                FactoryStore.dispatch({ type: 'SET_WALLET_HOURS', payload: defH });
            }

            // Subscribe to store updates to dynamically trigger re-renders
            FactoryStore.subscribe(function() {
                workerProfile.workedHours = FactoryStore.getState().workedHours;
                renderAll();
            });

            // Initial render
            renderAll();
        }

        function getDefaultProfileByName(name) {
            if (name === '최현일') {
                return { userId: 1, userName: "최현일", healthCertificateImage: "choi_cert.png", healthCertificateStatus: "approved", workedHours: 133 };
            } else if (name === '최수아') {
                return { userId: 2, userName: "최수아", healthCertificateImage: "sua_cert.png", healthCertificateStatus: "approved", workedHours: 22 };
            } else if (name === '김수민') {
                return { userId: 3, userName: "김수민", healthCertificateImage: null, healthCertificateStatus: null, workedHours: 0 };
            } else if (name === '김영희') {
                return { userId: 4, userName: "김영희", healthCertificateImage: "younghee_cert.png", healthCertificateStatus: "approved", workedHours: 45 };
            }
            return { userId: "guest", userName: name || "손님", healthCertificateImage: null, healthCertificateStatus: null, workedHours: 5 };
        }

        function getDefaultHistoryByName(name) {
            const today = new Date();
            const formatDate = (daysAgo) => {
                const d = new Date();
                d.setDate(today.getDate() - daysAgo);
                return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
            };

            if (name === '최현일') {
                return [
                    { date: formatDate(1), job: "지갑만들기", role: "매니저", pay: 220000, status: "완료" },
                    { date: formatDate(3), job: "우동만들기", role: "매니저", pay: 190000, status: "완료" },
                    { date: formatDate(5), job: "김치만들기", role: "매니저", pay: 180000, status: "완료" }
                ];
            } else if (name === '최수아') {
                return [
                    { date: formatDate(2), job: "우동만들기", role: "헬퍼", pay: 110000, status: "완료" },
                    { date: formatDate(6), job: "지갑만들기", role: "일반", pay: 50000, status: "완료" },
                    { date: formatDate(10), job: "김치만들기", role: "일반", pay: 45000, status: "완료" }
                ];
            } else if (name === '김수민') {
                return [
                    { date: formatDate(4), job: "우동만들기", role: "일반", pay: 45000, status: "완료" }
                ];
            } else if (name === '김영희') {
                return [
                    { date: formatDate(1), job: "지갑만들기", role: "헬퍼", pay: 120000, status: "완료" },
                    { date: formatDate(3), job: "우동만들기", role: "헬퍼", pay: 110000, status: "완료" },
                    { date: formatDate(8), job: "김치만들기", role: "헬퍼", pay: 115000, status: "완료" }
                ];
            }
            return [
                { date: formatDate(2), job: "김치만들기", role: "일반", pay: 40000, status: "완료" }
            ];
        }

        function renderAll() {
            renderEarnings();
            renderPartnerGrades();
            renderReservations();
            renderHistory();
            updateSimControls();
        }

        function renderEarnings() {
            const history = FactoryStore.getState().history;
            let baseSum = history.reduce((sum, item) => sum + item.pay, 0);

            const helperBase = parseInt(getPartitionedItem('kimp_helper_base_salary') || '0');
            const helperBonus = parseInt(getPartitionedItem('kimp_helper_bonus') || '0');

            const totalSum = baseSum + helperBase + helperBonus;

            $('#total-earnings-display').text(totalSum.toLocaleString());
        }

        function renderPartnerGrades() {
            const kimchiHours = FactoryStore.getState().workedHours || 0;
            const udonHours = FactoryStore.getState().udonHours || 0;
            const walletHours = FactoryStore.getState().walletHours || 0;

            function getGradeBadgeHtml(hours, isKimchi) {
                let label = "일반";
                let badgeClass = "badge01";

                if (hours >= 120) {
                    label = "매니저";
                    badgeClass = "badge03";
                } else if (hours >= 30) {
                    label = "헬퍼";
                    badgeClass = "badge02";
                } else {
                    label = "일반";
                    badgeClass = "badge01";
                }

                let html = `<span class="box-time">${Math.floor(hours)}h</span><span class="${badgeClass}">${label}</span>`;

                if (isKimchi && workerProfile.healthCertificateStatus !== 'approved') {
                    html += ` <span class="badge01 badge-health-warning">보건증 필요</span>`;
                }

                return html;
            }

            $('#grade-row-kimchi').html(getGradeBadgeHtml(kimchiHours, true));
            $('#grade-row-udon').html(getGradeBadgeHtml(udonHours, false));

            if (walletHours === 0) {
                $('#grade-row-wallet').html('<span class="box-time">-</span>');
            } else {
                $('#grade-row-wallet').html(getGradeBadgeHtml(walletHours, false));
            }
        }

        function renderReservations() {
            const container = $('#reservations-container');
            container.empty();

            let db = FactoryStore.getState().reservations || [];
            try {
                let kimpDb = JSON.parse(sessionStorage.getItem('kimp_reservations_db') || '[]');
                if (kimpDb && kimpDb.length > 0) {
                    db = db.concat(kimpDb);
                }
            } catch(e) {}
            
            // Deduplicate by id, date, slot (in case of overlap)
            let uniqueDbMap = {};
            db.forEach(r => {
                const key = r.date + '_' + r.slot + '_' + r.userId;
                uniqueDbMap[key] = r;
            });
            db = Object.values(uniqueDbMap);

            const myReservations = db.filter(r => String(r.userId) === String(currentUser.id) || r.userName === currentUser.name);

            if (myReservations.length === 0) {
                container.html('<div class="empty-state" style="padding: 20px; text-align: center; color: var(--text-sub); font-size: 13px;">예약된 일정이 없습니다.</div>');
                return;
            }

            const slotLabels = ['10:00 ~ 12:00', '13:00 ~ 15:00', '15:00 ~ 17:00'];

            myReservations.forEach(r => {
                const parts = r.date.split('-');
                let dayName = '';
                if (parts.length === 3) {
                    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                    const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
                    dayName = dayNames[d.getDay()];
                }

                const roleLabel = r.role === 'helper' ? '헬퍼' : (r.role === 'manager' ? '매니저' : '일반');
                const badgeClass = r.role === 'helper' ? 'badge02' : (r.role === 'manager' ? 'badge03' : 'badge01');

                let row = `
                <div class="box-partner reservation-item" style="margin-bottom: 12px;">
                    <div class="box-corp res-date-box">
                        <span class="res-date-time">${parts[1]}월 ${parts[2]}일</span>
                        <span class="res-date-time">${dayName}</span>
                    </div>
                    <div class="box-corp res-time-box">
                        <span class="res-date-time">${slotLabels[r.slot] || '지정 시간'}</span>
                    </div>
                    <div class="box-value res-job-box">
                        <div class="res-job-box2">
                         <img class="icon res" src="./images/k-icon_150x150.png"> 
                         <span class="brand-name">AFood</span> 
                         <span class="brand-work-name">김치만들기</span>
                        </div>
                        <div>
                        <span class="box-time">2h</span>
                        <span class="${badgeClass}">${roleLabel}</span>
                        </div>
                    </div>
                    <div class="box-value res-btn-box reverse">
                        
                        <button type="button" class="res-check-in-btn" onclick="location.href='check-in-announce.html'">출근하기</button>
                        <button type="button" class="res-cancel-btn" onclick="cancelReservation(${r.id})">예약 취소</button>
                    </div>
                </div>
                `;
                container.append(row);
            });
        }

        function cancelReservation(id) {
            if (!confirm("해당 예약을 정말 취소하시겠습니까?")) return;

            let db = FactoryStore.getState().reservations;
            const targetRes = db.find(r => r.id === id);

            const updatedReservations = db.filter(r => r.id !== id);
            FactoryStore.dispatch({ type: 'SET_RESERVATIONS', payload: updatedReservations });

            if (targetRes && typeof window.addAppLog === 'function') {
                const slotLabels = ['10:00 ~ 12:00', '13:00 ~ 15:00', '15:00 ~ 17:00'];
                const slotText = slotLabels[targetRes.slot] || '지정 시간';
                window.addAppLog(`김치만들기 공정 예약을 취소하였습니다. (${targetRes.date} ${slotText})`);
            }

            alert("예약이 정상적으로 취소되었습니다.");
        }

        function renderHistory() {
            const container = $('#history-container');
            container.empty();

            const history = FactoryStore.getState().history;

            if (history.length === 0) {
                container.html('<div class="empty-state">참여 이력이 없습니다.</div>');
                return;
            }

            history.forEach(item => {
                let brandLogo = './images/k-icon_150x150.png';
                let brandName = 'AFood';
                if (item.job.includes('우동')) {
                    brandLogo = './images/Uton_150x150.png';
                    brandName = 'Uton';
                } else if (item.job.includes('지갑')) {
                    brandLogo = './images/fancy_150x150.png';
                    brandName = 'Persa';
                }

                let row = `
                <div class="box-partner history-item" style="margin-bottom: 12px;">
                    <div class="hist-date">${item.date}</div>
                    <div class="box-corp">
                        <img class="icon2" src="${brandLogo}">
                        <span class="brand-name">${brandName}</span>
                        <div class="hist-job-title">${item.job} (${item.role})</div>
                    </div>
                    <div class="hist-pay">+₩ ${item.pay.toLocaleString()}</div>
                </div>
            `;
                container.append(row);
            });
        }

        function toggleSimPanel() {
            $('#sim-panel').slideToggle();
        }

        function updateSimControls() {
            const curHours = FactoryStore.getState().workedHours || 0;
            $('.sim-btn').each(function () {
                const text = $(this).text();
                if (text.includes(curHours + '시간')) {
                    $(this).addClass('active');
                } else {
                    $(this).removeClass('active');
                }
            });
        }

        function setWorkedHours(hours) {
            FactoryStore.dispatch({ type: 'SET_WORKED_HOURS', payload: hours });

            if (typeof window.addAppLog === 'function') {
                window.addAppLog(`김치만들기 시뮬레이션 근무 시간을 ${hours}시간으로 설정했습니다.`);
            }
        }

        function setHealthStatus(status) {
            workerProfile.healthCertificateStatus = status;
            workerProfile.healthCertificateImage = status ? "simulated_cert.png" : null;
            sessionStorage.setItem("kimp_worker_profile", JSON.stringify(workerProfile));

            if (typeof window.addAppLog === 'function') {
                const statusText = status === 'approved' ? '승인완료' : '미등록/필요';
                window.addAppLog(`시뮬레이션 보건증 상태를 [${statusText}]로 설정했습니다.`);
            }

            renderAll();
        }

        function resetSession() {
            if (confirm("세션을 초기화하시겠습니까? 로그인 정보 및 진행 데이터가 모두 삭제됩니다.")) {
                FactoryStore.dispatch({ type: 'RESET_ALL_DATA' });

                if (typeof window.addAppLog === 'function') {
                    window.addAppLog("세션을 초기화(로그아웃) 하였습니다.");
                }

                sessionStorage.clear();
                alert("로그아웃 되었습니다. 로그인 페이지로 이동합니다.");
                window.location.href = "./login.html";
            }
        }
