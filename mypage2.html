<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마이페이지 | 스마트팩토리 (Dark Dashboard)</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- 기존 스크립트 유지 -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="./js/auth.js" type="text/javascript"></script>
    <script src="./js/auth-guard.js" type="text/javascript"></script>
    <script src="./js/store.js" type="text/javascript"></script>
    <script src="./js/engine.js" type="text/javascript"></script>

    <style>
        /* =========================================
           ✨ Modern Dark Theme Variables
           ========================================= */
        :root {
            --bg-base: #070320;      /* 깊은 네이비 배경 */
            --bg-card: #272727;      /* 카드 배경 */
            --bg-card-hover: #334155;
            
            --text-main: #f8fafc;    /* 밝은 흰색 */
            --text-sub: #94a3b8;     /* 은은한 회색 */
            
            --accent-primary: #6366f1;   /* 인디고/보라 */
            --accent-secondary: rgb(253, 132, 237); /* 보라 */
            --accent-pink: #fd79a8;      /* 핫핑크 강조 색상 */
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --accent-money: #10b981;     /* 수입용 에메랄드 그린 */
            --border-light: rgba(255, 255, 255, 0.08);
            
            font-family: 'Pretendard', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .main-wrap {
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* --- Header (Glassmorphism) --- */
        .fixed-header-wrap {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
        }

        .menu-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .menu-bar i.back {
            margin-right: 12px;
            cursor: pointer;
            color: var(--text-sub);
            transition: color 0.2s;
        }
        .menu-bar i.back:hover { color: var(--text-main); }
        
        .header-icon {
            cursor: pointer;
            color: var(--text-sub);
            font-size: 20px;
        }

        main.main-mypage { padding: 0px 20px; }

        /* --- 🚀 통합 Hero Card (프로필 + 수입) --- */
        .hero-card {
            background: var(--accent-gradient);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        /* 카드 내 장식용 원형 패턴 */
        .hero-card::after {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 1;
        }

        .moji-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .mypage-info1 { display: flex; flex-direction: column; gap: 4px; z-index: 1; }
        #user-name-display { font-size: 20px; font-weight: 700; }
        #user-email-display { font-size: 13px; color: rgba(255,255,255,0.7); font-family: 'Outfit', sans-serif;}

        .earnings-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
        }

        .earnings-section .label { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.8); }
        .earnings-section .amount {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        /* --- Section Titles --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 16px 0;
        }
        .section-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-header a {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        /* --- 🧩 파트너 등급 (Dashboard Grid) --- */
        .partner-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .partner-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s;
        }
        .partner-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }

        .partner-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .partner-card-header img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }
        .partner-info { display: flex; flex-direction: column; }
        .partner-info .brand { font-size: 12px; color: var(--text-sub); font-family: 'Outfit', sans-serif; font-weight: 600;}
        .partner-info .job { font-size: 14px; font-weight: 700; }

        .partner-value {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        .partner-card.full-width { grid-column: span 2; }

        /* --- 🏷️ JS가 동적으로 주입하는 클래스 재정의 (다크모드용) --- */
        /* JS에서 쓰는 .badge01, .box-time, .box-partner 등 오버라이딩 */
        .badge01, .badge02, .badge03 {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }
        .badge01 { background: rgba(148, 163, 184, 0.2); color: var(--text-main); }
        .badge02 { background: rgba(99, 102, 241, 0.2); color: #818cf8; } /* 헬퍼 */
        .badge03 { background: rgba(16, 185, 129, 0.2); color: #34d399; } /* 매니저 */
        .badge-health-warning { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .box-time { font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--text-main); }

        /* 예약 및 히스토리 리스트 컨테이너 */
        #reservations-container, #history-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* JS 주입용 카드 (.box-partner를 공유함) */
        .box-partner.reservation-item {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .box-partner.history-item {
            background: rgba(22, 24, 34, 0.75) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-left: 4px solid var(--accent-pink) !important;
            border-radius: 14px !important;
            padding: 14px 16px;
            display: block;
            margin-bottom: 12px;
        }

        /* 예약 카드 내부 스타일 */
        .res-date-box, .res-time-box {
            display: flex;
            justify-content: space-between;
            color: var(--text-sub);
            font-size: 13px;
        }
        .res-job-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
        }
        .res-job-box2 { display: flex; align-items: center; gap: 8px; font-weight: 600;}
        .res-job-box2 img { width: 24px; height: 24px; border-radius: 6px; }

        .res-btn-box {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .res-check-in-btn, .res-cancel-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .res-check-in-btn { background: var(--accent-primary); color: white; }
        .res-check-in-btn:hover { background: #4f46e5; }
        .res-cancel-btn { background: transparent; border: 1px solid var(--border-light); color: var(--text-sub); }
        .res-cancel-btn:hover { background: rgba(255,255,255,0.05); color: white;}

        /* 히스토리 카드 내부 스타일 */
        .hist-date {
            display: flex;
            justify-content: space-between;
            color: var(--text-sub);
            font-size: 13px;
            border-bottom: 1px dashed var(--border-light);
            padding-bottom: 8px;
        }
        .history-item .box-corp {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        .history-item img { width: 36px; height: 36px; border-radius: 8px; }
        .hist-job-title { font-weight: 600; font-size: 16px; }
        .hist-pay {
            text-align: right;
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-money);
        }

        /* --- ⚙️ 시뮬레이션 패널 (Developer Terminal Style) --- */
        .sim-panel-toggle {
            display: none;
            background: #000;
            color: #34d399;
            font-family: monospace;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 40px;
            cursor: pointer;
            border: 1px dashed #34d399;
        }
        .sim-panel-content {
            display: none;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-top: 10px;
        }
        .sim-group label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .sim-flex { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;}
        .sim-btn {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .sim-btn.active { background: #34d399; color: #000; font-weight: bold; }
        .btn-logout-mypage {
            width: 100%;
            background: #7f1d1d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 모달 오버라이딩 */
        .modal-overlay-custom { background: rgba(0,0,0,0.8); }
        .modal-content-custom { background: var(--bg-base); border: 1px solid var(--border-light); }

    </style>
</head>

<body>
    <div class="main-wrap">
        <main class="main-mypage">
            <!-- Header -->
            <div class="fixed-header-wrap">
                <div class="menu-bar">
                    <div><i class="bi bi-chevron-left back"></i> <span style="margin-left:4px;">마이페이지</span></div>
                    <div class="header-icon" onclick="toggleSettings()"><i class="bi bi-gear"></i></div>
                </div>
            </div>

            <!-- 🚀 1. Hero Card (프로필 + 수입 통합) -->
            <div class="hero-card">
                <div class="profile-section">
                    <div class="moji-icon" id="user-avatar-initials">US</div>
                    <div class="mypage-info1">
                        <div id="user-name-display">사용자 님</div>
                        <div id="user-email-display">user@example.com</div>
                    </div>
                </div>
                <div class="earnings-section">
                    <span class="label">나의 정산 자산</span>
                    <div class="amount">₩ <span id="total-earnings-display">0</span></div>
                </div>
            </div>

            <!-- 🧩 2. 파트너 등급 (Grid 형태 위젯) -->
            <div class="section-header">
                <h3><i class="bi bi-award-fill" style="color:var(--accent-primary);"></i> 나의 파트너 등급</h3>
                <a href="./explore2.html?tab=partner">전체보기 <i class="bi bi-chevron-right"></i></a>
            </div>
            
            <div class="partner-grid">
                <!-- 김치만들기 (가로 풀 사이즈) -->
                <div class="partner-card full-width">
                    <div class="partner-card-header">
                        <img src="./images/k-icon_150x150.png" alt="AFood">
                        <div class="partner-info">
                            <span class="brand">AFood</span>
                            <span class="job">김치만들기</span>
                        </div>
                    </div>
                    <div class="partner-value" id="grade-row-kimchi">
                        <!-- JS Inject: <span class="box-time">14h</span><span class="badge01">일반</span> -->
                    </div>
                </div>

                <!-- 우동만들기 -->
                <div class="partner-card">
                    <div class="partner-card-header">
                        <img src="./images/Uton_150x150.png" alt="Uton">
                        <div class="partner-info">
                            <span class="brand">Uton</span>
                            <span class="job">우동만들기</span>
                        </div>
                    </div>
                    <div class="partner-value" id="grade-row-udon"></div>
                </div>

                <!-- 지갑만들기 -->
                <div class="partner-card">
                    <div class="partner-card-header">
                        <img src="./images/fancy_150x150.png" alt="Persa">
                        <div class="partner-info">
                            <span class="brand">Persa</span>
                            <span class="job">지갑만들기</span>
                        </div>
                    </div>
                    <div class="partner-value" id="grade-row-wallet"></div>
                </div>
            </div>

            <!-- 🛍️ 2.5. 나의 쇼핑 -->
            <div class="section-header" style="margin-top: 30px;">
                <h3><i class="bi bi-bag-check-fill" style="color:var(--accent-secondary);"></i> 나의 쇼핑</h3>
                <a href="./explore2.html?tab=shopping">더보기 <i class="bi bi-chevron-right"></i></a>

            <!-- 📅 3. 나의 일 예약 내역 -->

                <h3><i class="bi bi-calendar-check-fill" style="color:#10b981;"></i> 예약 내역</h3>
                <a href="./explore2.html?tab=reservation">전체보기 <i class="bi bi-chevron-right"></i></a>
            </div>
            <!-- JS가 이곳에 .box-partner .reservation-item HTML을 주입함 -->
            <div id="reservations-container"></div>

            <!-- 🕒 4. 내가 했던 일 (History) -->
            <div class="section-header" style="margin-top: 40px;">
                <h3><i class="bi bi-clock-history" style="color:#f59e0b;"></i> 내가 했던 일</h3>
                <a href="./explore2.html?tab=history">전체보기 <i class="bi bi-chevron-right"></i></a>
            </div>
            <!-- JS가 이곳에 .box-partner .history-item HTML을 주입함 -->
            <div id="history-container"></div>


            <!-- ⚙️ Simulation / Dev Tool -->
            <div class="sim-panel-toggle" onclick="toggleSimPanel()">
                <i class="bi bi-terminal"></i> [DEV] 테스트 데이터 조정 패널
            </div>
            <div class="sim-panel-content" id="sim-panel">

                        <button class="sim-btn" onclick="setWorkedHours(22)">22h (최수아)</button>
                        <button class="sim-btn" onclick="setWorkedHours(45)">45h (김영희)</button>
                        <button class="sim-btn" onclick="setWorkedHours(133)">133h (최현일)</button>
                    </div>
                </div>
                <div class="sim-group">
                    <label>> 보건증 상태</label>
                    <div class="sim-flex">
                        <button class="sim-btn" onclick="setHealthStatus(null)">미등록</button>
                        <button class="sim-btn" onclick="setHealthStatus('approved')">승인완료</button>
                    </div>
                </div>
                <button type="button" class="btn-logout-mypage" onclick="resetSession()">Session Clear & Logout</button>
            </div>
        </main>
    </div>

    <!-- 스크립트단: 제공해주신 원본 JS 코드를 100% 동일하게 유지 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/simulator.js" type="text/javascript"></script>
    <script>
        let currentUser = null;
        let workerProfile = null;

        // Load initial user session
        $(document).ready(function () {
            // Back Navigation
            $('.bi-chevron-left.back').click(function () {
                window.location.href = './main.html';
            });

            // Initialize user details
            initUserSession();
        });

        function initUserSession() {
            currentUser = window.AuthManager ? window.AuthManager.getCurrentUser() : null;
            if (!currentUser) {
                const userJson = sessionStorage.getItem("user");
                if (userJson) {
                    currentUser = JSON.parse(userJson);
                }
            }
            if (!currentUser) {
                alert("로그인이 필요합니다.");
                window.location.href = "./login.html";
                return;
            }

            // Render basic profile info
            $('#user-name-display').text(currentUser.name + ' 님');
            $('#user-email-display').text(currentUser.email);

            // Avatar initials
            const initials = currentUser.name ? currentUser.name.substring(0, 2) : 'US';
            $('#user-avatar-initials').text(initials);

            // Sync worker profile workedHours from FactoryStore userWorkHours table
            const currentUserId = currentUser.id || currentUser.name || "2";
            const currentKimchiHours = FactoryStore.getWorkHours(currentUserId, 1);

            let profileStr = sessionStorage.getItem("kimp_worker_profile");
            if (profileStr) {
                workerProfile = JSON.parse(profileStr);
            } else {
                workerProfile = getDefaultProfileByName(currentUser.name);
            }
            workerProfile.workedHours = currentKimchiHours;
            sessionStorage.setItem("kimp_worker_profile", JSON.stringify(workerProfile));

            if (FactoryStore.getState().history.length === 0) {
                const defaultHistory = getDefaultHistoryByName(currentUser.name);
                FactoryStore.dispatch({ type: 'SET_HISTORY', payload: defaultHistory });
            }

            // Subscribe to store updates to dynamically trigger re-renders
            FactoryStore.subscribe(function () {
                renderAll();
            });

            // Initial render
            renderAll();
        }

        function getDefaultProfileByName(name) {
            if (name === '최현일') {
                return { userId: 1, userName: "최현일", healthCertificateImage: "choi_cert.png", healthCertificateStatus: "approved", workedHours: 133 };
            } else if (name === '최수아') {
                return { userId: 2, userName: "최수아", healthCertificateImage: "sua_cert.png", healthCertificateStatus: "approved", workedHours: 22 };
            } else if (name === '김수민') {
                return { userId: 3, userName: "김수민", healthCertificateImage: null, healthCertificateStatus: null, workedHours: 0 };
            } else if (name === '김영희') {
                return { userId: 4, userName: "김영희", healthCertificateImage: "younghee_cert.png", healthCertificateStatus: "approved", workedHours: 45 };
            }
            return { userId: "guest", userName: name || "손님", healthCertificateImage: null, healthCertificateStatus: null, workedHours: 5 };
        }

        function getDefaultHistoryByName(name) {
            const today = new Date();
            const formatDate = (daysAgo) => {
                const d = new Date();
                d.setDate(today.getDate() - daysAgo);
                return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
            };

            if (name === '최현일') {
                return [
                    { date: formatDate(1), time: "13:00 ~ 15:00", job: "지갑만들기", role: "매니저", pay: 220000, status: "완료" },
                    { date: formatDate(3), time: "10:00 ~ 12:00", job: "우동만들기", role: "매니저", pay: 190000, status: "완료" },
                    { date: formatDate(5), time: "15:00 ~ 17:00", job: "김치만들기", role: "매니저", pay: 180000, status: "완료" }
                ];
            } else if (name === '최수아') {
                return [
                    { date: formatDate(2), time: "13:00 ~ 15:00", job: "우동만들기", role: "헬퍼", pay: 110000, status: "완료" },

        function renderHistory() {
            const container = $('#history-container');
            container.empty();

            let history = FactoryStore.getState().history || [];

            if (history.length === 0) {
                container.html('<div style="padding: 20px; text-align: center; color: var(--text-sub); font-size: 14px; background: rgba(0,0,0,0.2); border-radius: 12px;">참여 이력이 없습니다.</div>');
                return;
            }

            function parseDate(dateStr) {
                if (!dateStr) return new Date(0);
                if (dateStr.includes('년') && dateStr.includes('월')) {
                    const cleaned = dateStr.replace(/년|월|일/g, '').trim().split(/\s+/);
                    if (cleaned.length === 3) {
                        return new Date(parseInt(cleaned[0], 10), parseInt(cleaned[1], 10) - 1, parseInt(cleaned[2], 10));
                    }
                }
                const parts = dateStr.split('-');
                if (parts.length === 3) {
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                }
                return new Date(dateStr);
            }

            history = [...history].sort((a, b) => parseDate(b.date) - parseDate(a.date));

            function formatDisplayDate(dateStr) {
                if (!dateStr) return '';
                if (dateStr.includes('년') && dateStr.includes('월')) {
                    return dateStr.replace(/^\d+년\s*/, '');
                }
                const parts = dateStr.split('-');
                if (parts.length === 3) {
                    const month = parseInt(parts[1], 10);
                    const day = parseInt(parts[2], 10);
                    return `${month}월 ${day}일`;
                }
                return dateStr;
            }

            function roundTimeStr(timeStr, method = 'floor') {
                if (!timeStr) return "";
                const parts = timeStr.trim().split(':');
                if (parts.length < 2) return timeStr.trim();

                let h = parseInt(parts[0], 10);
                let m = parseInt(parts[1], 10);
                let s = parts.length === 3 ? parseInt(parts[2], 10) : 0;

                if (method === 'ceil' && s > 0) m += 1;
                else if (method === 'round' && s >= 30) m += 1;

                if (m >= 60) {
                    h += Math.floor(m / 60);
                    m = m % 60;
                }
                if (h >= 24) h = h % 24;

                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            }

            function roundTimeRange(rangeStr, method = 'floor') {
                if (!rangeStr) return "10:00 ~ 12:00";
                return rangeStr.split('~').map(t => roundTimeStr(t, method)).join(' ~ ');
            }

            history.forEach(item => {
                let brandLogo = './images/k-icon_150x150.png';
                let brandName = 'AFood';

                if (item.job && item.job.includes('우동')) {
                    brandLogo = './images/Uton_150x150.png';
                    brandName = 'Uton';
                } else if (item.job && item.job.includes('지갑')) {
                    brandLogo = './images/fancy_150x150.png';
                    brandName = 'Persa';
                }

                let displayTime = roundTimeRange(item.time, 'floor');

                let row = `
                <div class="box-partner history-item" onclick="showHistoryDetail(${item.id})">
                    <div class="hist-date">
                        <span>${formatDisplayDate(item.date)}</span>
                        <span style="font-family:'Outfit', sans-serif;">${displayTime}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">

                                <div class="hist-job-title">${item.job || ''} (${item.role || '일반'})</div>
                            </div>
                        </div>
                        <div class="hist-pay">+₩ ${(item.pay || 0).toLocaleString()}</div>
                    </div>
                </div>
                `;
                container.append(row);
            });
        }

        function cancelShopOrder(id) {
            if (!confirm("정말로 주문을 취소하시겠습니까?")) return;

            const state = window.FactoryStore ? window.FactoryStore.getState() : { shopHistory: [] };
            const target = state.shopHistory.find(item => item.id === id);
            if (target) {
                if (window.FactoryStore) {
                    window.FactoryStore.dispatch({ type: 'CANCEL_SHOP_ORDER', payload: id });
                }

                // 세션 및 로컬 카운트 대기열 연동 해제
                const activeProduct = sessionStorage.getItem('activeOrderProduct') || localStorage.getItem('activeOrderProduct_local');
                const activeNo = sessionStorage.getItem('activeOrderNo') || localStorage.getItem('activeOrderNo_local');
                if (activeProduct === target.productId || activeNo === target.orderNo) {
                    try {
                        sessionStorage.removeItem('activeOrderProduct');
                        sessionStorage.removeItem('activeOrderNo');
                        sessionStorage.removeItem('activeOrderQty');
                        localStorage.removeItem('activeOrderProduct_local');
                        localStorage.removeItem('activeOrderNo_local');
                        localStorage.removeItem('activeOrderQty_local');
                        localStorage.removeItem('activeOrderNo_current');
                        
                        let orderCount10Min = parseInt(sessionStorage.getItem('orderCount10Min') || "0");
                        orderCount10Min -= target.qty;
                        if (orderCount10Min < 0) orderCount10Min = 0;
                        sessionStorage.setItem('orderCount10Min', orderCount10Min.toString());

                        if (orderCount10Min < 2) {
                            sessionStorage.removeItem('orderLimitExpireTime');
                        }

                        const isUdon = target.productName.includes("우동");
                        if (isUdon) {
                            let udonOrderCount = parseInt(sessionStorage.getItem('udonOrderCount') || '0');
                            udonOrderCount -= target.qty;
                            if (udonOrderCount < 0) udonOrderCount = 0;
                            sessionStorage.setItem('udonOrderCount', udonOrderCount.toString());
                        } else {
                            let bibimOrderCount = parseInt(sessionStorage.getItem('bibimOrderCount') || '0');
                            bibimOrderCount -= target.qty;
                            if (bibimOrderCount < 0) bibimOrderCount = 0;
                            sessionStorage.setItem('bibimOrderCount', bibimOrderCount.toString());
                        }

                        // 로그 기록 추가
                        let loungeLogs = [];
                        const savedLogs = sessionStorage.getItem('udonBibimLoungeLogs');
                        if (savedLogs) loungeLogs = JSON.parse(savedLogs);
                        const now = new Date();
                        const hh = String(now.getHours()).padStart(2, '0');
                        const mm = String(now.getMinutes()).padStart(2, '0');
                        loungeLogs.push(`[${hh}시 ${mm}분] 주문 ${target.qty}그릇을 취소하였습니다.`);
                        sessionStorage.setItem('udonBibimLoungeLogs', JSON.stringify(loungeLogs));
                    } catch(e){}
                }
                
                alert("주문이 성공적으로 취소되었습니다.");
            }
        }

        function completeShopOrder(id) {
            const state = window.FactoryStore ? window.FactoryStore.getState() : { shopHistory: [] };
            const target = state.shopHistory.find(item => item.id === id);
            if (target) {
                if (window.FactoryStore) {
                    window.FactoryStore.dispatch({ type: 'COMPLETE_SHOP_ORDER', payload: id });
                }

                // 수령 완료했으므로 활성화된 활성 주문 상태 제거
                const activeProduct = sessionStorage.getItem('activeOrderProduct') || localStorage.getItem('activeOrderProduct_local');
                const activeNo = sessionStorage.getItem('activeOrderNo') || localStorage.getItem('activeOrderNo_local');
                if (activeProduct === target.productId || activeNo === target.orderNo) {
                    try {
                        sessionStorage.removeItem('activeOrderProduct');
                        sessionStorage.removeItem('activeOrderNo');
                        sessionStorage.removeItem('activeOrderQty');
                        localStorage.removeItem('activeOrderProduct_local');
                        localStorage.removeItem('activeOrderNo_local');
                        localStorage.removeItem('activeOrderQty_local');
                        localStorage.removeItem('activeOrderNo_current');
                    } catch(e){}
                }

                renderEarnings();
                renderShopHistory();
                alert("🔔 조리 완료 알림이 떴습니다!\n음식을 정상적으로 수령하였습니다. 맛있게 드세요! 😀");
            }
        }

        function toggleSimPanel() {
            $('#sim-panel').slideToggle();
        }

        function updateSimControls() {
            const curHours = FactoryStore.getState().workedHours || 0;
            $('.sim-btn').each(function () {
                const text = $(this).text();
                if (text.includes(curHours + 'h')) {
                    $(this).addClass('active');
                } else {
                    $(this).removeClass('active');
                }
            });
        }

        function setWorkedHours(hours) {
            FactoryStore.dispatch({ type: 'SET_WORKED_HOURS', payload: hours });

            if (workerProfile) {
                workerProfile.workedHours = hours;
                sessionStorage.setItem("kimp_worker_profile", JSON.stringify(workerProfile));
            }

            if (typeof window.addAppLog === 'function') {
                window.addAppLog(`김치만들기 시뮬레이션 근무 시간을 ${hours}시간으로 설정했습니다.`);
            }

            renderAll();
        }

        function setHealthStatus(status) {
            workerProfile.healthCertificateStatus = status;
            workerProfile.healthCertificateImage = status ? "simulated_cert.png" : null;
            sessionStorage.setItem("kimp_worker_profile", JSON.stringify(workerProfile));

            if (typeof window.addAppLog === 'function') {
                const statusText = status === 'approved' ? '승인완료' : '미등록/필요';
                window.addAppLog(`시뮬레이션 보건증 상태를 [${statusText}]로 설정했습니다.`);
            }

            renderAll();
        }

        function resetSession() {
            if (confirm("세션을 초기화하시겠습니까? 로그인 정보 및 진행 데이터가 모두 삭제됩니다.")) {
                FactoryStore.dispatch({ type: 'RESET_ALL_DATA' });

                if (typeof window.addAppLog === 'function') {
                    window.addAppLog("세션을 초기화(로그아웃) 하였습니다.");
                }

                sessionStorage.clear();
                alert("로그아웃 되었습니다. 로그인 페이지로 이동합니다.");
                window.location.href = "./login.html";
            }
        }

        function toggleSettings() {
            window.location.href = "settings.html";
        }

        function showHistoryDetail(id) {
            // Explore2 혹은 Detail 화면 연계 코드로, 기존 JS 원본 유지용 껍데기 함수
            window.location.href = `explore_detail.html?id=${id}`;
        }
    </script>
</body>

</html>
