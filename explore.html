<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/explore.css?v=1.0.2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <title>마이페이지 | 스마트팩토리</title>
    <style>
        /* --------------------------------------
           1. 빈 상태 (Empty State) 디자인 
        -------------------------------------- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            color: #4720ca;
            opacity: 0.6;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 14px;
            color: #a7a7a7;
            margin-bottom: 20px;
        }

        .btn-go-popular {
            background: linear-gradient(135deg, #7b5cf5, #4720ca);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(123, 92, 245, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-go-popular:active {
            transform: scale(0.95);
        }

        /* --------------------------------------
           2. 공통 작업 리스트 디자인 (누락 복구)
        -------------------------------------- */
        .task-item {
            height: 80px;
            min-height: 80px;
            display: flex;
            align-items: center;

        }

        .task-items0 {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-items .texts span:first-child {
            font-size: 16px;
            font-weight: bold;
            color: #e4e4e4;
        }

        .task-items .texts span:last-child {
            font-size: 16px;
            color: #979797;
        }

        /* --------------------------------------
           3. 우측 데이터 영역 (급여, 지역, Task 등) 
        -------------------------------------- */
        /* 급여 전용 */
        .task-salary-col {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .task-salary-col .val {
            font-weight: bold;
            color: #e4e4e4;
        }

        .task-salary-col .change-rate {
            font-size: 12px;
            margin-top: 2px;
        }

        .task-salary-col i {
            font-size: 12px;
        }

        .status-up {
            color: #00b894;
        }

        .status-down {
            color: #ff6b6b;
        }

        /* 그 외 정보 (지역, 참여자 등) */
        .task-info-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
        }


        .task-info-row .val.highlight {
            font-weight: bold;
            color: #fff;
        }

        /* --------------------------------------
           4. 카테고리 탭 전용 디자인 
        -------------------------------------- */
        .category-list-item {
            width: 100%;
            display: flex;
            /* 요소들을 가로로 배치 */
            align-items: center;
            /* 세로 중앙 정렬 */
            justify-content: space-between;
            /* 양쪽 끝으로 쫙 밀어줌 (핵심 해결!) */
            padding: 0 15px;
        }

        .category-name {
            font-size: 16px;
            font-weight: 500;
            color: #bbbbbb;
        }

        .category-count {
            font-size: 16px;
            font-weight: bold;
            color: #bbbbbb;
        }
    </style>
</head>

<body>
    <div class="header-wrap">
        <div class="header menu-bar mypage">
            <div class="chevron" onclick="window.history.back();" style="cursor: pointer;"><i
                    class="bi bi-chevron-left back"></i></div>
            <div class="title"><span>작업 둘러보기</span></div>
        </div>


        <div class="padding-20"></div>
        <div class="tabs">
            <ul class="tab-list">
                <li class="tab-item active" data-target="popular">인기 급상승</li>
                <li class="tab-item" data-target="favorite">즐겨찾기</li>
                <li class="tab-item" data-target="new">새로운 일</li>
                <li class="tab-item" data-target="category">카테고리</li>
            </ul>
        </div>
    </div>
    <div class="main-wrap">
        <main class="main">
            <div class="content-area">
                <!-- 인기 급상승 탭 -->
                <section class="tab-content active">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">지역</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">급여</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">Task 수</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">참여자</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">생성일</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                    </div>
                </section>
                <!-- 즐겨찾기 탭 -->
                <section class="tab-content">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">지역</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">급여</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">Task 수</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">참여자</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">생성일</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                    </div>
                </section>
                <!-- 새로운 일 탭 -->
                <section class="tab-content">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">지역</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">급여</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">Task 수</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">참여자</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">생성일</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                    </div>
                </section>
                <!-- 카테고리 탭 -->
                <section class="tab-content">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">이름</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                        <div class="sort-item"><span class="lspace">개수</span>
                            <div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i
                                    class="bi bi-caret-down-fill"></i></div>
                        </div>
                    </div>

                    <div class="search-container">
                        <div class="search-box">
                            <input type="text" id="category-search" placeholder="카테고리 검색...">

    <script src="./js/store.js"></script>
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {

            // -------------------------
            // 1. 데이터 영역 (store.js에서 관리)
            // -------------------------

            async function fetchWorksData() {
                if (!localStorage.getItem('kimp_works_db')) {
                    localStorage.setItem('kimp_works_db', window.MockData.worksJSON);
                }

                // 속도 지연(setTimeout) 없이 즉시 데이터 반환
                return JSON.parse(localStorage.getItem('kimp_works_db'));
            }

            let dbData = [];
            let categoryData = [];
            let currentSortType = '급여';

            // -------------------------
            // 유틸 함수 (이메일 가져오기)
            // -------------------------
            function getCurrentUserEmail() {
                var userEmail = 'guest_email';
                try {
                    var userJson = sessionStorage.getItem('user');
                    if (userJson) {
                        var userObj = JSON.parse(userJson);
                        if (userObj.email && userObj.email.trim() !== "") userEmail = userObj.email;
                        else if (userObj.id) userEmail = 'user_' + userObj.id;
                    }
                } catch (e) { }
                return userEmail;
            }



            // 로딩 UI 제거 함수
            function hideLoading($targetTab) {
                $targetTab.find('.loading-container').remove();
            }

            // -------------------------
            // 2. 초기화 및 렌더링 영역
            // -------------------------
            async function init() {
                localStorage.removeItem('kimp_works_db'); // 실행할 때마다 DB 삭제
                let $firstTab = $('.tab-content').eq(0);

                showLoading($firstTab);
                dbData = await fetchWorksData();
                categoryData = extractCategoryData(dbData);
                hideLoading($firstTab);
                renderWorkList(dbData, $firstTab);
            }

            function extractCategoryData(data) {
                let catMap = {};
                data.forEach(work => {
                    if (work.categories) {
                        work.categories.forEach(cat => {
                            let c = cat.trim();
                            if (c) catMap[c] = (catMap[c] || 0) + 1;
                        });
                    }
                });
                return Object.keys(catMap).map(key => ({ name: key, count: catMap[key] }));
            }



            // 로딩 함수: 기존 데이터 지울 때 slider-box도 지워줍니다
            function showLoading($targetTab) {
                $targetTab.find('.slider-box').remove(); // 추가됨
                $targetTab.find('.task-item').remove();
                $targetTab.find('.empty-state').remove();
                $targetTab.find('.loading-container').remove();

                let loadingHtml = `
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text"></div>
        </div>
    `;
                $targetTab.append(loadingHtml);
            }

            // 작업 리스트 렌더링 함수
            function renderWorkList(dataArray, $targetTab) {
                $targetTab.find('.slider-box').remove(); // 이전 슬라이더 박스 삭제

                let innerHtml = ''; // 데이터를 담을 빈 바구니

                if (dataArray.length === 0) {
                    innerHtml = `
        <div class="empty-state">
            <i class="bi bi-folder-x empty-state-icon"></i>
            <div class="empty-state-text">아직 작업이 없어요.</div>
            <button class="btn-go-popular">새로운 작업 둘러보기</button>
        </div>`;
                } else {
                    let isFavoriteTab = $targetTab.index() === 1;

                    dataArray.forEach(function (item) {
                        let rightSideHtml = '';

                        if (currentSortType === '급여') {
                            let changePercent = (item.salaryChange * 100).toFixed(0);
                            let statusClass = item.salaryChange >= 0 ? 'status-up' : 'status-down';
                            let iconDir = item.salaryChange >= 0 ? 'up' : 'down';
                            let sign = item.salaryChange > 0 ? '+' : '';

                            rightSideHtml = `
                <div class="task-salary-col">
                    <div>
                        <i class="bi bi-caret-${iconDir}-fill ${statusClass}"></i>
                        <span class="val">${item.salary}</span>
                    </div>
                    <div class="change-rate ${statusClass}">${sign}${changePercent}%</div>
                </div>`;
                        } else if (currentSortType === '지역') {
                            rightSideHtml = `<div class="task-info-row"><i class="bi bi-geo-alt-fill"></i><span class="val">${item.region}</span></div>`;
                        } else if (currentSortType === 'Task 수') {
                            rightSideHtml = `<div class="task-info-row"><span class="info-label">Task</span><span class="val highlight">${item.taskCount}</span></div>`;
                        } else if (currentSortType === '참여자') {
                            rightSideHtml = `<div class="task-info-row"><i class="bi bi-people-fill"></i><span class="val highlight">${item.participants}명</span></div>`;
                        } else if (currentSortType === '생성일') {
                            rightSideHtml = `<div class="task-info-row"><i class="bi bi-calendar-check"></i><span class="val">${item.createdAt}</span></div>`;
                        }

                        let favorites = JSON.parse(localStorage.getItem('kimp_favorites') || '[]');
                        let isFav = favorites.includes(String(item.workId));
                        let showStarIcon = (isFavoriteTab && isFav);
                        let iconHtml = showStarIcon
                            ? `<div class="star-class"><i class="bi bi-star-fill" style="color: yellow;"></i></div>`
                            : `<img src="${item.iconUrl}">`;

                        // 개별 아이템들을 innerHtml 바구니에 담습니다
                        innerHtml += `
            <div class="task-item" data-id="${item.workId}">
                <div class="task-items0">
                    <div class="task-items" style="display: flex; align-items: center;">
                        ${iconHtml}
                        <div class="texts" style="display: flex; flex-direction: column;">
                            <span>${item.workName}</span>
                            <span>${item.brandName}</span>
                        </div>
                    </div>
                    ${rightSideHtml}
                </div>
            </div>`;
                    });
                }

                // ⭐️ 모아둔 데이터를 통째로 slider-box로 감싸서 한 번에 화면에 붙입니다
                $targetTab.append(`<div class="slider-box">${innerHtml}</div>`);
            }

            // 카테고리 렌더링 함수
            function renderCategoryList(dataArray, $targetTab) {
                $targetTab.find('.slider-box').remove();

                let innerHtml = '';

                if (dataArray.length === 0) {
                    innerHtml = `
        <div class="empty-state">
            <i class="bi bi-tags empty-state-icon"></i>
            <div class="empty-state-text">추출할 카테고리 정보가 없어요.</div>
            <button class="btn-go-popular">새로운 작업 둘러보기</button>
        </div>`;
                } else {
                    dataArray.forEach(function (item) {
                        innerHtml += `
            <div class="task-item category-list-item">
                <span class="category-name">${item.name}</span>
                <span class="category-count">${item.count}</span>
            </div>`;
                    });
                }

                // ⭐️ 모아둔 데이터를 통째로 slider-box로 감싸서 추가
                $targetTab.append(`<div class="slider-box">${innerHtml}</div>`);
            }

            // -------------------------
            // 3. 정렬 아이템 클릭 이벤트
            // -------------------------
            $(document).on('click', '.sort-item', function () {
                let $this = $(this);
                let sortType = $this.find('.lspace').text().trim();
                let $activeTab = $this.closest('.tab-content');
                let tabIndex = $activeTab.index();

                $('.sort-item').not(this).removeClass('sort-up sort-down');

                let isAscending = true;
                if ($this.hasClass('sort-up')) {
                    $this.removeClass('sort-up').addClass('sort-down');
                    isAscending = false;
                } else {
                    $this.removeClass('sort-down').addClass('sort-up');
                    isAscending = true;
                }

                if (tabIndex === 3) { // 카테고리 탭 정렬
                    categoryData.sort((a, b) => {
                        let result = sortType === '이름' ? a.name.localeCompare(b.name) : a.count - b.count;
                        return isAscending ? result : -result;
                    });
                    renderCategoryList(categoryData, $activeTab);
                } else { // 그 외 탭 정렬
                    currentSortType = sortType;
                    dbData.sort((a, b) => {
                        let result = 0;
                        switch (sortType) {
                            case '지역': result = a.region.localeCompare(b.region); break;
                            case '급여': result = a.salary - b.salary; break;
                            case 'Task 수': result = a.taskCount - b.taskCount; break;
                            case '참여자': result = a.participants - b.participants; break;
                            case '생성일': result = new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime(); break;
                        }
                        return isAscending ? result : -result;
                    });

                    // ⭐ 각 탭에 맞게 필터링 후 렌더링
                    if (tabIndex === 1) {
                        // 즐겨찾기 탭 필터링
                        let favorites = JSON.parse(localStorage.getItem('kimp_favorites') || '[]');
                        let favoriteData = dbData.filter(work => favorites.includes(String(work.workId)));
                        renderWorkList(favoriteData, $activeTab);
                    } else if (tabIndex === 2) {
                        // 새로운 일 탭 필터링 (isNew가 true인 것만)
                        let onlyNewData = dbData.filter(work => work.isNew === true);
                        renderWorkList(onlyNewData, $activeTab);
                    } else {
                        // 인기 급상승 탭 (전체)
                        renderWorkList(dbData, $activeTab);
                    }
                }
            });

            // -------------------------
            // 4. 상단 탭 클릭 이벤트
            // -------------------------
            // -------------------------
            // 4. 상단 탭 클릭 이벤트
            // -------------------------
            $(document).on('click', '.tab-list .tab-item', function () {
                // 👇 [추가된 부분] 현재 활성화된 탭과 새로 누른 탭의 위치(인덱스) 비교
                let currentIndex = $('.tab-list .tab-item.active').index();
                let targetIndex = $(this).index();

                // 새로 갈 탭이 현재 탭보다 번호가 크면(오른쪽) next, 작으면(왼쪽) prev
                let moveDirection = targetIndex > currentIndex ? 'move-next' : 'move-prev';

                // (선택) 같은 탭이거나 처음 로딩 시 예외 처리
                if (currentIndex === -1 || currentIndex === targetIndex) {
                    moveDirection = 'move-next';
                }
                // 👆 [추가된 부분 끝]

                $('.tab-item').removeClass('active');
                $(this).addClass('active');

                let $targetTab = $('.tab-content').eq(targetIndex);

                // 👇 기존 active 클래스를 지울 때, 방향 클래스도 같이 지우고 새 방향을 넣어줍니다.
                $('.tab-content').removeClass('active move-next move-prev');
                $targetTab.addClass('active ' + moveDirection);

                // --- 아래부터는 기존 필터링/렌더링 코드 그대로 유지 ---
                if (targetIndex === 1) { // 즐겨찾기 탭
                    let favorites = JSON.parse(localStorage.getItem('kimp_favorites') || '[]');
                    let favoriteData = dbData.filter(work => favorites.includes(String(work.workId)));
                    renderWorkList(favoriteData, $targetTab);
                } else if (targetIndex === 2) { // 새로운 일 탭
                    let onlyNewData = dbData.filter(work => work.isNew === true);
                    let newData = [...onlyNewData].sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());

                    $targetTab.find('.sort-item').removeClass('sort-up sort-down');
                    $targetTab.find('.sort-item:contains("생성일")').addClass('sort-down');

                    renderWorkList(newData, $targetTab);
                } else if (targetIndex === 3) { // 카테고리 탭
                    categoryData.sort((a, b) => a.name.localeCompare(b.name));
                    $targetTab.find('.sort-item').removeClass('sort-up sort-down');
                    $targetTab.find('.sort-item').first().addClass('sort-up');
                    renderCategoryList(categoryData, $targetTab);
                } else { // 인기 급상승 탭
                    renderWorkList(dbData, $targetTab);
                }
            });

            // 빈 화면에서 돌아가기 버튼
            $(document).on('click', '.btn-go-popular', function () {
                $('.tab-list .tab-item').eq(0).click();
            });

            // 작업 아이템 클릭 시 상세 페이지로 이동
            $(document).on('click', '.task-item', function() {
                let id = $(this).data('id');
                if (id) {
                    window.location.href = './work_detail.html?id=' + id;
                }
            });

            // 카테고리 검색 기능
            $(document).on('keyup', '#category-search', function () {
                let keyword = $(this).val().toLowerCase().trim();
                let $activeTab = $('.tab-content').eq(3);

                let filteredCategoryData = categoryData.filter(function (item) {
                    return item.name.toLowerCase().includes(keyword);
                });

                renderCategoryList(filteredCategoryData, $activeTab);
            });

            // ⭐ 앱 시작
            init();
        });
        // -------------------------
        // 5. 스와이프(터치) 기능 - 밑줄만 반대 방향으로 이동 (고급 UI)
        // -------------------------
        let startX = 0;
        let startY = 0;
        let endX = 0;
        let isSwiping = false;
        let isScrolling = false;

        let $activeSlider = null;
        let $activeSortRow = null;
        let $activeSearchBox = null;
        let $activeTabItem = null;

        function resetSwipeStyles() {
            if ($activeSlider) $activeSlider.css({ 'transform': '', 'transition': '', 'animation': '' });
            if ($activeSortRow) $activeSortRow.css({ 'transform': '', 'transition': '', 'animation': '' });
            if ($activeSearchBox) $activeSearchBox.css({ 'transform': '', 'transition': '', 'animation': '' });

            // 👇 밑줄 위치 변수 초기화 및 애니메이션 껍데기 제거
            if ($activeTabItem && $activeTabItem.length) {
                $activeTabItem[0].style.setProperty('--line-offset', '0px');
                $activeTabItem.removeClass('snap-back');
            }
        }

        $(document).on('touchstart', '.main-wrap', function (e) {
            startX = e.originalEvent.touches[0].clientX;
            startY = e.originalEvent.touches[0].clientY;
            endX = startX;

            isSwiping = true;
            isScrolling = false;

            $('.tab-content').removeClass('move-next move-prev');

            let $activeTab = $('.tab-content.active');
            $activeSlider = $activeTab.find('.slider-box');
            $activeSortRow = $activeTab.find('.sort-row');
            $activeSearchBox = $activeTab.find('.search-container');

            $activeTabItem = $('.tab-list .tab-item.active');

            resetSwipeStyles();
        });

        $(document).on('touchmove', '.main-wrap', function (e) {
            if (!isSwiping) return;

            let currentX = e.originalEvent.touches[0].clientX;
            let currentY = e.originalEvent.touches[0].clientY;

            let diffX = currentX - startX;
            let diffY = currentY - startY;

            if (!isScrolling) {
                if (Math.abs(diffY) > Math.abs(diffX)) {
                    isSwiping = false;
                    return;
                } else {
                    isScrolling = true;
                }
            }

            endX = currentX;

            let moveX = diffX * 0.8;

            // 💡 [핵심] 밑줄 이동 계산! 반대 방향이므로 -diffX를 사용합니다.
            // 탭 넓이를 고려해 0.3 ~ 0.5 정도가 가장 예쁩니다.
            let lineRatio = 0.4;
            let lineMoveX = -diffX * lineRatio;

            if ($activeSlider.length) $activeSlider.css('transform', `translateX(${moveX}px)`);
            if ($activeSortRow.length) $activeSortRow.css('transform', `translateX(calc(-50% + ${moveX}px))`);
            if ($activeSearchBox.length) $activeSearchBox.css('transform', `translateX(calc(-50% + ${moveX}px))`);

            // 👇 글씨를 움직이지 않고 CSS 변수를 통해 가상 요소(밑줄)만 움직입니다.
            if ($activeTabItem.length) {
                $activeTabItem[0].style.setProperty('--line-offset', `${lineMoveX}px`);
            }
        });

        $(document).on('touchend', '.main-wrap', function (e) {
            if (!isSwiping) return;
            isSwiping = false;

            let swipeDistance = endX - startX;
            let screenWidth = $(window).width();
            let threshold = screenWidth * 0.5;

            let currentIndex = $('.tab-list .tab-item.active').index();
            let totalTabs = $('.tab-list .tab-item').length;

            if (swipeDistance <= -threshold && currentIndex < totalTabs - 1) {
                resetSwipeStyles();
                $('.tab-list .tab-item').eq(currentIndex + 1).click();
            }
            else if (swipeDistance >= threshold && currentIndex > 0) {
                resetSwipeStyles();
                $('.tab-list .tab-item').eq(currentIndex - 1).click();
            }
            else {
                if ($activeSlider.length) $activeSlider.css({ 'transform': 'translateX(0)', 'transition': 'transform 0.3s ease-out' });
                if ($activeSortRow.length) $activeSortRow.css({ 'transform': 'translateX(-50%)', 'transition': 'transform 0.3s ease-out' });
                if ($activeSearchBox.length) $activeSearchBox.css({ 'transform': 'translateX(-50%)', 'transition': 'transform 0.3s ease-out' });

                // 👇 손을 뗐을 때 밑줄이 제자리로 부드럽게 튕겨 돌아가게 설정
                if ($activeTabItem.length) {
                    $activeTabItem.addClass('snap-back'); // CSS 트랜지션 발동
                    $activeTabItem[0].style.setProperty('--line-offset', '0px'); // 0 위치로 복귀
                }

                setTimeout(() => { resetSwipeStyles(); }, 300);
            }
        });

    </script>

</body>

</html>
