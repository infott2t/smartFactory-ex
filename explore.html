<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/explore.css?v=1.0.2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>마이페이지 | 스마트팩토리</title>
    <style>
        /* --------------------------------------
           1. 빈 상태 (Empty State) 디자인 
        -------------------------------------- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            color: #4720ca;
            opacity: 0.6;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 14px;
            color: #a7a7a7;
            margin-bottom: 20px;
        }

        .btn-go-popular {
            background: linear-gradient(135deg, #7b5cf5, #4720ca);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(123, 92, 245, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-go-popular:active {
            transform: scale(0.95);
        }

        /* --------------------------------------
           2. 공통 작업 리스트 디자인 (누락 복구)
        -------------------------------------- */
        .task-item {
            height: 80px;
            min-height: 80px;
            display: flex;
            align-items: center;
           
        }

        .task-items0 {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-items .texts span:first-child {
            font-size: 16px;
            font-weight: bold;
            color: #bbbbbb;
        }

        .task-items .texts span:last-child {
            font-size: 16px;
            color: #979797;
        }

        /* --------------------------------------
           3. 우측 데이터 영역 (급여, 지역, Task 등) 
        -------------------------------------- */
        /* 급여 전용 */
        .task-salary-col {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .task-salary-col .val { font-weight: bold; color: #bbbbbb; }
        .task-salary-col .change-rate { font-size: 12px; margin-top: 2px; }
        .task-salary-col i { font-size: 12px; }
        .status-up { color: #00b894; }
        .status-down { color: #ff6b6b; }

        /* 그 외 정보 (지역, 참여자 등) */
        .task-info-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
        }
         
         
        .task-info-row .val.highlight { font-weight: bold; color: #fff; }

        /* --------------------------------------
           4. 카테고리 탭 전용 디자인 
        -------------------------------------- */
        .category-list-item {
            width: 100%;
            display: flex; /* 요소들을 가로로 배치 */
            align-items: center; /* 세로 중앙 정렬 */
            justify-content: space-between; /* 양쪽 끝으로 쫙 밀어줌 (핵심 해결!) */
            padding: 0 15px;
        }

        .category-name {
            font-size: 14px;
            font-weight: 500;
            color: #bbbbbb;
        }

        .category-count {
            font-size: 14px;
            font-weight: bold;
            color: #bbbbbb;
        }
    </style>
</head>

<body>
    <div class="header-wrap">
        <div class="header menu-bar mypage">
            <div class="chevron" onclick="window.history.back();" style="cursor: pointer;"><i class="bi bi-chevron-left back"></i></div>
            <div class="title"><span>작업 둘러보기</span></div>
        </div>
    </div>
    <div class="main-wrap">
        <main class="main">
            <div class="padding-20"></div>
            <div class="tabs">
                <ul class="tab-list">
                    <li class="tab-item active" data-target="popular">인기 급상승</li>
                    <li class="tab-item" data-target="favorite">즐겨찾기</li>
                    <li class="tab-item" data-target="new">새로운 일</li>
                    <li class="tab-item" data-target="category">카테고리</li>
                </ul>
            </div>
            <div class="content-area">
                <!-- 인기 급상승 탭 -->
                <section class="tab-content active">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">지역</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">급여</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">Task 수</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">참여자</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">생성일</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                    </div>
                </section>
                <!-- 즐겨찾기 탭 -->
                <section class="tab-content">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">지역</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">급여</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">Task 수</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">참여자</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">생성일</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                    </div>
                </section>
                <!-- 새로운 일 탭 -->
                <section class="tab-content">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">지역</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">급여</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">Task 수</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">참여자</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">생성일</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                    </div>
                </section>
                <!-- 카테고리 탭 -->
                <section class="tab-content">
                    <div class="sort-row">
                        <div class="sort-item"><span class="lspace">이름</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                        <div class="sort-item"><span class="lspace">개수</span><div class="sort-arrows"><i class="bi bi-caret-up-fill"></i><i class="bi bi-caret-down-fill"></i></div></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="./js/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {

            // 1. 데이터 영역
            const MOCK_JSON_DATA = `[
            {
                "workId": 1, "workName": "김치만들기", "brandName": "AFood", "iconUrl": "./images/k-icon_150x150.png",
                "salary": 1.3, "salaryChange": 0.01, "taskCount": 5, "participants": 123, "createdAt": "2024-08-01",
                "region": "서울시 성동구 성수동", "categories": ["음식", "요리", "김치", "만들기"]
            },
            {
                "workId": 2, "workName": "우동만들기", "brandName": "Uton", "iconUrl": "./images/Uton_150x150.png",
                "salary": 1.1, "salaryChange": -0.05, "taskCount": 4, "participants": 70, "createdAt": "2025-03-19",
                "region": "서울시 강남구 역삼동", "categories": ["음식", "요리", "우동", "만들기"]
            },
            {
                "workId": 3, "workName": "지갑만들기", "brandName": "Persa", "iconUrl": "./images/fancy_150x150.png",
                "salary": 1.2, "salaryChange": 0.02, "taskCount": 5, "participants": 30, "createdAt": "2026-09-09",
                "region": "서울시 마포구 합정동", "categories": ["악세사리", "지갑", "만들기"]
            }
            ]`;

            async function fetchWorksData() {
                if (!localStorage.getItem('kimp_works_db')) {
                    localStorage.setItem('kimp_works_db', MOCK_JSON_DATA);
                }
                return JSON.parse(localStorage.getItem('kimp_works_db'));
            }

            let dbData = [];
            let categoryData = [];
            let currentSortType = '급여';

            // 2. 초기화 및 렌더링 영역
            async function init() {
                dbData = await fetchWorksData();
                categoryData = extractCategoryData(dbData);
                renderWorkList(dbData, $('.tab-content').eq(0)); 
            }

            function extractCategoryData(data) {
                let catMap = {};
                data.forEach(work => {
                    if (work.categories) {
                        work.categories.forEach(cat => {
                            let c = cat.trim();
                            if (c) catMap[c] = (catMap[c] || 0) + 1;
                        });
                    }
                });
                return Object.keys(catMap).map(key => ({ name: key, count: catMap[key] }));
            }

            function renderWorkList(dataArray, $targetTab) {
                $targetTab.find('.task-item').remove();
                $targetTab.find('.empty-state').remove();

                if (dataArray.length === 0) {
                    let emptyHtml = `
                    <div class="empty-state">
                        <i class="bi bi-folder-x empty-state-icon"></i>
                        <div class="empty-state-text">아직 즐겨찾기한 작업이 없어요.</div>
                        <button class="btn-go-popular">새로운 작업 둘러보기</button>
                    </div>`;
                    $targetTab.append(emptyHtml);
                    return;
                }

                dataArray.forEach(function (item) {
                    let rightSideHtml = '';

                    if (currentSortType === '급여') {
                        let changePercent = (item.salaryChange * 100).toFixed(0);
                        let statusClass = item.salaryChange >= 0 ? 'status-up' : 'status-down';
                        let iconDir = item.salaryChange >= 0 ? 'up' : 'down';
                        let sign = item.salaryChange > 0 ? '+' : '';

                        rightSideHtml = `
                        <div class="task-salary-col">
                            <div>
                                <i class="bi bi-caret-${iconDir}-fill ${statusClass}"></i>
                                <span class="val">${item.salary}</span>
                            </div>
                            <div class="change-rate ${statusClass}">${sign}${changePercent}%</div>
                        </div>`;
                    } else if (currentSortType === '지역') {
                        rightSideHtml = `<div class="task-info-row"><i class="bi bi-geo-alt-fill"></i><span class="val">${item.region}</span></div>`;
                    } else if (currentSortType === 'Task 수') {
                        rightSideHtml = `<div class="task-info-row"><span class="info-label">Task</span><span class="val highlight">${item.taskCount}</span></div>`;
                    } else if (currentSortType === '참여자') {
                        rightSideHtml = `<div class="task-info-row"><i class="bi bi-people-fill"></i><span class="val highlight">${item.participants}명</span></div>`;
                    } else if (currentSortType === '생성일') {
                        rightSideHtml = `<div class="task-info-row"><i class="bi bi-calendar-check"></i><span class="val">${item.createdAt}</span></div>`;
                    }

                    let html = `
                    <div class="task-item" data-id="${item.workId}">
                        <div class="task-items0">
                            <div class="task-items">
                                <img src="${item.iconUrl}">
                                <div class="texts"><span>${item.workName}</span><span>${item.brandName}</span></div>
                            </div>
                            ${rightSideHtml}
                        </div>
                    </div>`;
                    $targetTab.append(html);
                });
            }

            function renderCategoryList(dataArray, $targetTab) {
                $targetTab.find('.task-item').remove();
                $targetTab.find('.empty-state').remove();

                if (dataArray.length === 0) {
                    let emptyHtml = `
                    <div class="empty-state">
                        <i class="bi bi-tags empty-state-icon"></i>
                        <div class="empty-state-text">추출할 카테고리 정보가 없어요.</div>
                        <button class="btn-go-popular">새로운 작업 둘러보기</button>
                    </div>`;
                    $targetTab.append(emptyHtml);
                    return;
                }

                dataArray.forEach(function (item) {
                    let html = `
                    <div class="task-item category-list-item">
                        <span class="category-name">${item.name}</span>
                        <span class="category-count">${item.count}</span>
                    </div>`;
                    $targetTab.append(html);
                });
            }

            // 3. 이벤트 리스너 영역 (정렬 및 탭 전환)
            $(document).on('click', '.sort-item', function () {
                let $this = $(this);
                let sortType = $this.find('.lspace').text().trim();
                let $activeTab = $this.closest('.tab-content');
                let isCategoryTab = $activeTab.index() === 3;

                $('.sort-item').not(this).removeClass('sort-up sort-down');

                let isAscending = true;
                if ($this.hasClass('sort-up')) {
                    $this.removeClass('sort-up').addClass('sort-down');
                    isAscending = false;
                } else {
                    $this.removeClass('sort-down').addClass('sort-up');
                    isAscending = true;
                }

                if (isCategoryTab) {
                    categoryData.sort((a, b) => {
                        let result = sortType === '이름' ? a.name.localeCompare(b.name) : a.count - b.count;
                        return isAscending ? result : -result;
                    });
                    renderCategoryList(categoryData, $activeTab);
                } else {
                    currentSortType = sortType;
                    dbData.sort((a, b) => {
                        let result = 0;
                        switch (sortType) {
                            case '지역': result = a.region.localeCompare(b.region); break;
                            case '급여': result = a.salary - b.salary; break;
                            case 'Task 수': result = a.taskCount - b.taskCount; break;
                            case '참여자': result = a.participants - b.participants; break;
                            case '생성일': result = new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime(); break;
                        }
                        return isAscending ? result : -result;
                    });
                    renderWorkList(dbData, $activeTab);
                }
            });

            function getCurrentUserEmail() {
                var userEmail = 'guest_email';
                try {
                    var userJson = sessionStorage.getItem('user');
                    if (userJson) {
                        var userObj = JSON.parse(userJson);
                        if (userObj.email && userObj.email.trim() !== "") userEmail = userObj.email;
                        else if (userObj.id) userEmail = 'user_' + userObj.id;
                    }
                } catch (e) { }
                return userEmail;
            }

            $(document).on('click', '.tab-list .tab-item', function () {
                $('.tab-item').removeClass('active');
                $(this).addClass('active');

                let tabIndex = $(this).index();
                let $targetTab = $('.tab-content').eq(tabIndex);

                $('.tab-content').removeClass('active');
                $targetTab.addClass('active');

                if (tabIndex === 1) {
                    let userEmail = getCurrentUserEmail();
                    let favoriteKey = 'kimp_favorite_' + userEmail;
                    let isKimpFavorite = localStorage.getItem(favoriteKey) === 'true';

                    let favoriteData = isKimpFavorite ? dbData.filter(work => work.workId === 1) : [];
                    renderWorkList(favoriteData, $targetTab);
                } else if (tabIndex === 3) {
                    categoryData.sort((a, b) => a.name.localeCompare(b.name));
                    $targetTab.find('.sort-item').removeClass('sort-up sort-down');
                    $targetTab.find('.sort-item').first().addClass('sort-up');

                    renderCategoryList(categoryData, $targetTab);
                } else {
                    renderWorkList(dbData, $targetTab);
                }
            });

            $(document).on('click', '.btn-go-popular', function () {
                $('.tab-list .tab-item').eq(0).click();
            });

            // ⭐ 앱 시작
            init();
        });
    </script>
</body>

</html>
