    <script src="./js/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {

            $('.tab-list .tab-item').click(function () {
                // 1. 기존에 선택되어 있던 탭의 active 클래스를 지우고, 방금 클릭한 탭에 부여합니다.
                $('.tab-item').removeClass('active');
                $(this).addClass('active');

                // 2. 클릭한 탭이 몇 번째(0, 1, 2...) 자식인지 순서를 가져옵니다.
                var tabIndex = $(this).index();

                // 3. 모든 콘텐츠의 active 클래스를 지워 숨긴 후, 탭 순서와 일치하는 콘텐츠에만 active 클래스를 줍니다.
                $('.tab-content').removeClass('active');
                $('.tab-content').eq(tabIndex).addClass('active');
            });
            // 정렬(Sort) 메뉴 클릭 이벤트
            $('.sort-item').click(function () {
                // 1. 방금 클릭한 항목 외에 다른 항목들의 정렬 상태를 초기화 (회색으로 되돌림)
                $('.sort-item').not(this).removeClass('sort-up sort-down');

                // 2. 현재 클릭한 항목의 위/아래 상태를 변경
                if ($(this).hasClass('sort-up')) {
                    // 이미 위쪽이 하얀색이면 -> 아래쪽을 하얀색으로 바꿈 (내림차순)
                    $(this).removeClass('sort-up').addClass('sort-down');
                } else {
                    // 기본 상태이거나 아래쪽이 하얀색이면 -> 위쪽을 하얀색으로 바꿈 (오름차순)
                    $(this).removeClass('sort-down').addClass('sort-up');
                }
            });
        });
    </script>
