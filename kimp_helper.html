<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>김치만들기 - 헬퍼 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="./js/auth.js" type="text/javascript"></script>
    <script src="./js/auth-guard.js" type="text/javascript"></script>
    <script src="./js/store.js" type="text/javascript"></script>
    <script src="./js/engine.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-color: #0b0b16;
            --card-bg: #121226;
            --card-border: #1e1e3f;
            --text-main: #ffffff;
            --text-sub: #76769e;
            --neon-blue: #7b92ff;
            --amber-accent: #e85d04;
            --neon-green: #00b894;
            --btn-disabled: #1d1d36;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: #0b0b16;
            display: flex;
            flex-direction: column;
            padding: 16px 16px 120px 16px;
            position: relative;
        }
        .time-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 16px 8px;
            margin-bottom: 8px;
        }
        .time-box { display: flex; flex-direction: column; }
        .time-box.left { align-items: flex-start; }
        .time-box.right { align-items: flex-end; }
        .time-value {
            font-family: 'Outfit', 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--neon-blue);
            letter-spacing: 0.5px;
        }
        .time-label { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
        .salary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .salary-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .salary-label { font-size: 11px; color: var(--text-sub); font-weight: 500; }
        .salary-value { font-size: 20px; font-weight: 700; color: #fff; }
        .salary-value span { font-size: 12px; color: var(--text-sub); font-weight: 500; margin-left: 2px; }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .header-title i { color: var(--neon-blue); }
        .header-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-sub);
        }
        .header-meta i { color: #ffd700; }
        
        .section-title {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .section-title i { color: var(--amber-accent); }
        
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card.active-card {
            border-color: var(--amber-accent);
            box-shadow: 0 4px 20px rgba(232, 93, 4, 0.08);
        }
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 14px;
        }
        .meta-item { display: flex; flex-direction: column; gap: 4px; }
        .meta-label { font-size: 11px; color: var(--text-sub); font-weight: 500; }
        .meta-value { font-size: 15px; font-weight: 600; color: #fff; }
        
        .btn-action {
            background-color: var(--amber-accent);
            border: none;
            color: #fff;
            padding: 12px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-action:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        .btn-action:disabled {
            background: var(--btn-disabled);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            opacity: 0.5;
        }
        .btn-secondary {
            background-color: #212140;
            border: 1px solid var(--card-border);
            color: #fff;
        }
        .btn-secondary:hover { background-color: var(--neon-blue); }
        
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background-color: rgba(11, 11, 22, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--card-border);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 12px 0 24px 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: #fff; }
        .nav-item.active i {
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(123, 92, 245, 0.4);
        }
        
        /* 헬퍼 전 전광판 스타일 */
        .notice-banner {
            background-color: rgba(232, 93, 4, 0.1);
            border: 1px solid rgba(232, 93, 4, 0.25);
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            color: #ffb380;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { border-color: rgba(232, 93, 4, 0.2); }
            100% { border-color: rgba(232, 93, 4, 0.6); }
        }
        .support-timer-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: #141432;
            border-radius: 12px;
            border: 1px dashed var(--neon-blue);
            margin-top: 10px;
        }
        .support-timer-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--neon-green);
            font-variant-numeric: tabular-nums;
        }

        /* ── Overall Progress 카드 ── */
        .overall-progress-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #1a1a33;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7b5cf5, var(--neon-green));
            border-radius: 3px;
            transition: width 1s linear;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- ── 상단 시계 표시 ── -->
        <div class="time-header">
            <div class="time-box left">
                <span class="time-value" id="current-clock">·15:04</span>
                <span class="time-label">현재 시간</span>
            </div>
            <div class="time-box right">
                <span class="time-value" id="remaining-clock">01:56:00</span>
                <span class="time-label">남은 시간</span>
            </div>
        </div>

        <!-- ── 급여 요약 카드 ── -->
        <div class="salary-row" style="grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;">
            <div class="salary-card" style="padding: 12px 8px; text-align: center;">
                <span class="salary-label" style="font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">현재 시간당 급여량</span>
                <span class="salary-value" style="font-size: 15px; font-weight: bold; white-space: nowrap;">12,384<span style="font-size: 9px;">KRW/h</span></span>
            </div>
            <div class="salary-card" style="padding: 12px 8px; text-align: center;">
                <span class="salary-label" style="font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">급여 배수 최저임금대비</span>
                <span class="salary-value" style="font-size: 15px; font-weight: bold; white-space: nowrap;">1.2배</span>
            </div>
            <div class="salary-card" style="padding: 12px 8px; border-color: var(--neon-green); text-align: center;">
                <span class="salary-label" style="font-size: 9px; color: var(--neon-green); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">누적 헬퍼 보너스</span>
                <span class="salary-value" id="helper-bonus-display" style="font-size: 15px; font-weight: bold; color: var(--neon-green); white-space: nowrap;">0<span style="font-size: 9px; color: var(--text-sub);">KRW</span></span>
            </div>
        </div>

        <!-- 사용자 정보 배너 -->
        <div id="user-info-banner" style="background-color: rgba(123, 92, 245, 0.1); border: 1px solid rgba(123, 92, 245, 0.2); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; display: flex; flex-direction: column; gap: 6px;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <span><i class="bi bi-person-fill"></i> 로그인 사용자: <strong id="logged-in-user-name" style="color: var(--neon-blue);">--- (헬퍼)</strong></span>
            </div>
            <div style="border-top: 1px solid rgba(123, 92, 245, 0.15); padding-top: 6px; display: flex; align-items: center; gap: 6px; width: 100%;">
                <i class="bi bi-clock-fill" style="color: var(--neon-green);"></i>
                <span>출근 등록 시간: <strong id="logged-in-checkin-time" style="color: var(--neon-green);">--:--:--</strong></span>
            </div>
        </div>

        <!-- ── Overall Progress 카드 ── -->
        <div class="overall-progress-card">
            <div class="progress-info">
                <span>Overall Progress</span>
                <span id="progress-pct-label">3%</span>
            </div>
            <div class="progress-bar-bg" style="margin-bottom: 12px;">
                <div class="progress-bar-fill" id="overall-progress-bar" style="width: 3%;"></div>
            </div>
            <!-- 추가된 급여 및 쉰 시간 정보 영역 -->
            <div style="border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 12px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div style="display: flex; flex-direction: column; gap: 2px;">
                    <span style="font-size: 10px; color: var(--text-sub);">총 쉰 시간 (급여 제외)</span>
                    <span style="font-size: 14px; font-weight: 700; color: #ff6b6b;" id="total-break-time-display">00분 00초</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2px; align-items: flex-end;">
                    <span style="font-size: 10px; color: var(--text-sub);" id="accum-salary-label">현재 누적급여</span>
                    <span id="helper-bonus-text-experience" style="display: none; font-size: 10px; color: var(--neon-green); margin-bottom: 2px; font-weight: bold;"></span>
                    <span style="font-size: 14px; font-weight: 700; color: var(--neon-green);" id="accum-salary-display">0 KRW</span>
                </div>
            </div>
        </div>

        <!-- ── 메인 타이틀 (김치만들기) ── -->
        <header class="app-header">
            <div class="header-title" onclick="openStatusPage()">
                <i class="bi bi-person-workspace"></i>
                <span>김치만들기 <span style="font-size: 13px; color: var(--neon-blue); font-weight: normal;">(헬퍼 모드)</span></span>
            </div>
            <div class="header-meta">
                <i class="bi bi-star-fill"></i>
                <strong id="header-helper-name">헬퍼</strong>
            </div>
        </header>

        <!-- ── 헬퍼 관리보드 섹션 ── -->
        <div class="section-title">
            <i class="bi bi-telephone-inbound-fill"></i>
            <span>실시간 지원 요청 현황</span>
        </div>

        <div id="helper-dashboard-card" class="card">
            <!-- 동적으로 상황에 맞춰 내용이 렌더링됩니다. -->
        </div>

        <!-- 현장 공정 작업 참여하기 버튼 -->
        <button class="btn-action" onclick="enterTaskWork()" style="margin-bottom: 24px; background: linear-gradient(135deg, #7b5cf5, #4720ca); border: none; height: 48px;">
            <i class="bi bi-clipboard-check"></i> 현장 공정 작업 참여하기 (Task Work)
        </button>

        <!-- ── 하단 내비게이션 바 ── -->
        <nav class="bottom-nav-bar">
            <a href="kimp.html" class="nav-item">
                <i class="bi bi-layout-text-window-reverse"></i>
                <span>Floor</span>
            </a>
            <div class="nav-item active">
                <i class="bi bi-person-workspace"></i>
                <span>Helper Dashboard</span>
            </div>
            <div class="nav-item" onclick="alert('전체 운영 통계(Metrics)를 로드합니다.')">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Metrics</span>
            </div>
            <div class="nav-item" onclick="alert('사용자 프로필 설정으로 이동합니다.')">
                <i class="bi bi-person-circle"></i>
                <span>Profile</span>
            </div>
        </nav>

    </div>

    <script>
        // 현재 로그인 헬퍼 사용자 정보 초기화
        var _helperSessionUser = window.AuthManager ? window.AuthManager.getCurrentUser() : null;
        if (!_helperSessionUser) {
            try { _helperSessionUser = JSON.parse(sessionStorage.getItem('user')); } catch(e) {}
        }
        var currentUserName = _helperSessionUser ? (_helperSessionUser.name || '헬퍼') : '헬퍼';
        var currentUserId = _helperSessionUser ? (_helperSessionUser.id || _helperSessionUser.email || 'guest') : 'guest';

        // 전역 시계 관리 (localStorage로부터 싱크)
        var clockHour = 15;
        var clockMinute = 4;
        var secondCounter = 0;
        var remainingSeconds = 6960;

        function syncClock() {
            var h = getPartitionedItem('kimp_clock_hour');
            var m = getPartitionedItem('kimp_clock_minute');
            var s = getPartitionedItem('kimp_second_counter');
            var rem = getPartitionedItem('kimp_remaining_seconds');
            if (h !== null) clockHour = parseInt(h);
            if (m !== null) clockMinute = parseInt(m);
            if (s !== null) secondCounter = parseInt(s);
            if (rem !== null) remainingSeconds = parseInt(rem);

            // 클락 UI 업데이트
            var hStr = Math.floor(remainingSeconds / 3600);
            var mStr = Math.floor((remainingSeconds % 3600) / 60);
            var sStr = remainingSeconds % 60;
            document.getElementById('remaining-clock').textContent = 
                String(hStr).padStart(2, '0') + ':' + 
                String(mStr).padStart(2, '0') + ':' + 
                String(sStr).padStart(2, '0');

            document.getElementById('current-clock').textContent = 
                '·' + String(clockHour).padStart(2, '0') + ':' + 
                String(clockMinute).padStart(2, '0');

            // Overall Progress 업데이트
            var totalSeconds = 7200;
            var elapsedSeconds = totalSeconds - remainingSeconds;
            var pct = Math.round((elapsedSeconds / totalSeconds) * 100);
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;

            var pctLabel = document.getElementById('progress-pct-label');
            var barFill = document.getElementById('overall-progress-bar');
            if (pctLabel) pctLabel.textContent = pct + '%';
            if (barFill) barFill.style.width = pct + '%';
        }

        // 급여 연동
        function syncSalary() {
            // 출근 시간(kimp_check_in_time)부터 현재까지의 실제 경과 시간 계산하여 base_salary 갱신
            var checkInTimeStr = getPartitionedItem('kimp_check_in_time');
            var elapsedSinceCheckIn = 0;
            if (checkInTimeStr && checkInTimeStr !== '-') {
                var parts = checkInTimeStr.split(':');
                if (parts.length >= 2) {
                    var ciH = parseInt(parts[0]) || 0;
                    var ciM = parseInt(parts[1]) || 0;
                    var ciS = parts.length > 2 ? (parseInt(parts[2]) || 0) : 0;
                    var checkInSecs = ciH * 3600 + ciM * 60 + ciS;
                    var now = new Date();
                    var nowSecs = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                    var diff = nowSecs - checkInSecs;
                    if (diff < 0) diff += 86400;
                    elapsedSinceCheckIn = diff;
                }
            }
            var base = Math.floor(elapsedSinceCheckIn * (12384 / 3600));
            if (window.SimulationEngine && window.SimulationEngine.isMaster()) {
                setPartitionedItem('kimp_helper_base_salary', base);
            }

            var bonus = parseInt(getPartitionedItem('kimp_helper_bonus') || '0');
            var total = base + bonus;

            var baseEl = document.getElementById('helper-base-salary-display');
            var bonusEl = document.getElementById('helper-bonus-display');
            var totalEl = document.getElementById('helper-total-salary-display');
            if (baseEl) baseEl.innerHTML = base.toLocaleString() + '<span>KRW</span>';
            if (bonusEl) bonusEl.innerHTML = bonus.toLocaleString() + '<span>KRW</span>';
            if (totalEl) totalEl.innerHTML = total.toLocaleString() + '<span>KRW</span>';

            // 헬퍼 총급여 동기화 (현재 로그인 사용자 기반)
            if (window.SimulationEngine && window.SimulationEngine.isMaster()) {
                setPartitionedItem('kimp_salary', total);
            }

            // Overall Progress 카드의 필드 업데이트
            var accumSalaryDisplay = document.getElementById('accum-salary-display');
            if (accumSalaryDisplay) {
                accumSalaryDisplay.textContent = total.toLocaleString() + ' KRW';
            }
            var bonusTextEl = document.getElementById('helper-bonus-text-experience');
            if (bonusTextEl) {
                bonusTextEl.style.display = 'block';
                bonusTextEl.textContent = '보너스 +' + bonus.toLocaleString() + ' KRW';
            }

            var accumBreakSeconds = parseInt(getPartitionedItem('kimp_accum_break_seconds') || '0');
            var breakMin = Math.floor(accumBreakSeconds / 60);
            var breakSec = accumBreakSeconds % 60;
            var breakDisplay = document.getElementById('total-break-time-display');
            if (breakDisplay) {
                breakDisplay.textContent = String(breakMin).padStart(2, '0') + "분 " + String(breakSec).padStart(2, '0') + "초";
            }
        }

        function addTimelineLog(text) {
            var logTime = String(clockHour).padStart(2, '0') + ':' + 
                          String(clockMinute).padStart(2, '0') + ':' + 
                          String(secondCounter).padStart(2, '0');
            var timeline = JSON.parse(getPartitionedItem('kimp_session_timeline') || '[]');
            timeline.push({ time: logTime, text: text });
            setPartitionedItem('kimp_session_timeline', JSON.stringify(timeline));
            window.dispatchEvent(new Event('storage'));
        }

        // 헬퍼 기능 관련 상태 관리
        var supportInterval = null;
        var requestHistory = []; // 요청 이력 최신순 누적

        function updateDashboard() {
            var reqStr = getPartitionedItem('kimp_help_request');
            var card = document.getElementById('helper-dashboard-card');
            if (!card) return;

            if (!reqStr) {
                // 요청 없음 (대기 중) - 이력 있으면 함께 표시
                card.className = "card";
                var historyHtml = requestHistory.length > 0
                    ? '<div style="margin-top:14px; border-top:1px solid rgba(255,255,255,0.07); padding-top:12px;">' +
                      '<div style="font-size:11px; font-weight:700; color:var(--text-sub); margin-bottom:8px; letter-spacing:0.5px;">— 최근 지원 이력 (최신순) —</div>' +
                      requestHistory.map(function(h) {
                          return '<div style="font-size:11px; color:var(--text-sub); padding:5px 8px; background:rgba(255,255,255,0.03); border-radius:6px; margin-bottom:4px; line-height:1.5;">' +
                              '<span style="color:#fff; font-weight:600;">' + h.time + '</span> &nbsp;·&nbsp; ' +
                              '<span style="color:var(--neon-blue);">' + h.requester + '</span> &nbsp;·&nbsp; ' +
                              'Stage ' + h.stage + ' ' + h.stageName +
                          '</div>';
                      }).join('') +
                      '</div>'
                    : '';
                card.innerHTML =
                    '<div style="text-align: center; padding: 20px 0; color: var(--text-sub);">' +
                        '<i class="bi bi-hourglass-split" style="font-size: 32px; display: block; margin-bottom: 12px; color: var(--text-sub);"></i>' +
                        '<span style="font-size: 13px;">대기 중... (체험자의 도움 요청을 기다리고 있습니다)</span>' +
                    '</div>' + historyHtml;
                if (supportInterval) {
                    clearInterval(supportInterval);
                    supportInterval = null;
                }
                return;
            }

            var req = JSON.parse(reqStr);

            if (req.status === "requested") {
                // 요청 들어옴 - 이력에 추가 (중복 방지)
                var alreadyLogged = requestHistory.some(function(h) {
                    return h.time === req.time && h.requester === req.requester;
                });
                if (!alreadyLogged) {
                    requestHistory.unshift({ time: req.time, requester: req.requester, stage: req.stage, stageName: req.stageName });
                    if (requestHistory.length > 20) requestHistory.pop();
                }

                var prevHistHtml = requestHistory.length > 1
                    ? '<div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.07); padding-top:8px;">' +
                      '<div style="font-size:10px; color:var(--text-sub); margin-bottom:5px;">— 이전 요청 이력 (최신순) —</div>' +
                      requestHistory.slice(1).map(function(h) {
                          return '<div style="font-size:10px; color:#666; padding:2px 0;">' + h.time + ' · ' + h.requester + ' · Stage ' + h.stage + '</div>';
                      }).join('') +
                      '</div>'
                    : '';

                card.className = "card active-card";
                card.innerHTML =
                    '<div class="notice-banner">' +
                        '<i class="bi bi-exclamation-triangle-fill"></i>' +
                        '<span>도움 요청했습니다. 해당 자리로 이동해주세요.</span>' +
                    '</div>' +
                    '<div class="meta-grid">' +
                        '<div class="meta-item"><span class="meta-label">도움 요청자</span><span class="meta-value">' + req.requester + ' 님</span></div>' +
                        '<div class="meta-item"><span class="meta-label">요청 공정 (Task)</span><span class="meta-value" style="color: var(--neon-blue);">' + req.stageName + ' (Stage ' + req.stage + ')</span></div>' +
                        '<div class="meta-item"><span class="meta-label">작업 중인 지시서</span><span class="meta-value">' + req.order + '</span></div>' +
                        '<div class="meta-item"><span class="meta-label">요청 접수 시간</span><span class="meta-value">' + req.time + '</span></div>' +
                    '</div>' +
                    '<div style="display: flex; gap: 10px;">' +
                        '<button class="btn-action" onclick="goToHelp()" style="flex: 1; background: linear-gradient(135deg, var(--neon-green), #02b667);"><i class="bi bi-person-walking"></i> 지금 가서 도와주기</button>' +
                        '<button class="btn-action btn-secondary" onclick="tellWait()" style="flex: 1;"><i class="bi bi-hourglass-split"></i> 기다리라고 하기</button>' +
                    '</div>' +
                    prevHistHtml;

            } else if (req.status === "accepted") {
                // 수락됨 (이동 중)
                card.className = "card active-card";
                card.innerHTML = `
                    <div class="notice-banner" style="background: rgba(123, 92, 245, 0.1); border-color: rgba(123, 92, 245, 0.3); color: var(--neon-blue); animation: none;">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span>${req.requester}님의 공정(Stage ${req.stage})으로 이동 중입니다. 도착하면 아래 버튼을 눌러주세요.</span>
                    </div>
                    <div class="meta-grid">
                        <div class="meta-item">
                            <span class="meta-label">도움 대상자</span>
                            <span class="meta-value">${req.requester} 님</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">요청 공정</span>
                            <span class="meta-value">${req.stageName}</span>
                        </div>
                    </div>
                    <button class="btn-action" onclick="arriveAtTask()" style="background: linear-gradient(135deg, #f5a623, #e08c10);">
                        <i class="bi bi-pin-map-fill"></i> 도착후 도와주기 시작
                    </button>
                `;
            } else if (req.status === "advising") {
                // 도움 제공 중 (카운트업 타이머)
                card.className = "card active-card";
                var advSec = req.advisingTime !== undefined ? req.advisingTime : 0;
                var adv_min = Math.floor(advSec / 60);
                var adv_sec = advSec % 60;
                var timerText = String(adv_min).padStart(2, '0') + ":" + String(adv_sec).padStart(2, '0');

                card.innerHTML = `
                    <div style="font-size: 13px; color: var(--text-sub); text-align: center;">
                        <i class="bi bi-chat-left-heart-fill" style="color: var(--neon-green); margin-right: 4px;"></i>
                        <strong>${req.requester}</strong> 님에게 어드바이스 지원 중...
                    </div>
                    <div class="support-timer-box">
                        <span style="font-size: 11px; color: var(--text-sub); margin-bottom: 4px;">도움 시간</span>
                        <span id="support-timer-value" class="support-timer-value">${timerText}</span>
                    </div>
                    <button class="btn-action" onclick="completeSupport()" style="background: linear-gradient(135deg, var(--neon-green), #02b667);">
                        <i class="bi bi-check-circle-fill"></i> 도움 완료
                    </button>
                `;
                
                // 카운트업 타이머 작동 개시 (이미 동작 중이 아니면)
                if (!supportInterval) {
                    supportInterval = setInterval(function() {
                        var r = getPartitionedItem('kimp_help_request');
                        if (!r) {
                            clearInterval(supportInterval);
                            supportInterval = null;
                            updateDashboard();
                            return;
                        }
                        var rq = JSON.parse(r);
                        if (rq.status !== "advising") {
                            clearInterval(supportInterval);
                            supportInterval = null;
                            updateDashboard();
                            return;
                        }
                        // 카운트업: advisingTime is dynamically updated by SimulationEngine in engine.js
                        var fresh = getPartitionedItem('kimp_help_request');
                        if (fresh) {
                            rq = JSON.parse(fresh);
                        }
                        
                        // UI 직접 갱신
                        var min_u = Math.floor(rq.advisingTime / 60);
                        var sec_u = rq.advisingTime % 60;
                        var timerEl = document.getElementById('support-timer-value');
                        if (timerEl) {
                            timerEl.textContent = String(min_u).padStart(2, '0') + ":" + String(sec_u).padStart(2, '0');
                        }
                    }, 1000);
                }
            } else if (req.status === "completed") {
                card.className = "card";
                card.innerHTML = `
                    <div style="text-align: center; padding: 20px 0; color: var(--text-sub);">
                        <i class="bi bi-check-circle-fill" style="font-size: 32px; display: block; margin-bottom: 12px; color: var(--neon-green);"></i>
                        <span style="font-size: 13px;">도움 완료! (다음 요청 대기 중)</span>
                    </div>
                `;
                setTimeout(function() {
                    removePartitionedItem('kimp_help_request');
                    updateDashboard();
                }, 2000);
            } else if (req.status === "waiting_helper") {
                // 기다리라고 한 상태 - 헬퍼 화면에는 여전히 요청 정보 + 지금 가기 버튼
                card.className = "card active-card";
                card.innerHTML = `
                    <div class="notice-banner" style="background: rgba(255,170,80,0.08); border-color: rgba(255,170,80,0.3); color: var(--amber-accent); animation: none;">
                        <i class="bi bi-hourglass-split"></i>
                        <span>${req.requester}님에게 잠시 기다려 달라고 전달했습니다. 준비되면 이동하세요.</span>
                    </div>
                    <div class="meta-grid">
                        <div class="meta-item">
                            <span class="meta-label">도움 요청자</span>
                            <span class="meta-value">${req.requester} 님</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">요청 공정 (Task)</span>
                            <span class="meta-value" style="color: var(--neon-blue);">${req.stageName} (Stage ${req.stage})</span>
                        </div>
                    </div>
                    <button class="btn-action" onclick="goToHelp()" style="background: linear-gradient(135deg, var(--neon-green), #02b667);">
                        <i class="bi bi-person-walking"></i> 지금 가서 도와주기
                    </button>
                `;
            }
        }

        // 지금 가서 도와주기 - 헬퍼가 이동 시작
        function goToHelp() {
            var reqStr = getPartitionedItem('kimp_help_request');
            if (!reqStr) return;
            var req = JSON.parse(reqStr);
            req.status = "accepted";
            setPartitionedItem('kimp_help_request', JSON.stringify(req));
            
            // 타임라인 로그 기록
            addTimelineLog(currentUserName + " 헬퍼님이 " + req.requester + "님의 Stage " + req.stage + " 도움 지원을 위해 이동 중입니다.");
            
            updateDashboard();
            window.dispatchEvent(new Event('storage'));
        }

        // 기다리라고 하기 - 체험자에게 대기 메시지 전달
        function tellWait() {
            var reqStr = getPartitionedItem('kimp_help_request');
            if (!reqStr) return;
            var req = JSON.parse(reqStr);
            req.status = "waiting_helper"; // 헬퍼가 곧 가겠다는 대기 상태
            setPartitionedItem('kimp_help_request', JSON.stringify(req));
            
            addTimelineLog(currentUserName + " 헬퍼님이 " + req.requester + "님에게 잠시 기다려달라고 전달했습니다.");
            
            updateDashboard();
            window.dispatchEvent(new Event('storage'));
        }

        // 도착후 도와주기 시작 (advisingTime 카운트업)
        function arriveAtTask() {
            var reqStr = getPartitionedItem('kimp_help_request');
            if (!reqStr) return;
            var req = JSON.parse(reqStr);
            req.status = "advising";
            req.advisingTime = 0; // 카운트업 시작
            setPartitionedItem('kimp_help_request', JSON.stringify(req));
            
            addTimelineLog(currentUserName + " 헬퍼님이 " + req.requester + "님의 Stage " + req.stage + " 현장에 도착하여 도움을 시작했습니다.");
            
            updateDashboard();
            window.dispatchEvent(new Event('storage'));
        }



        // 도움 완료 및 500원 지급
        function completeSupport() {
            if (supportInterval) {
                clearInterval(supportInterval);
                supportInterval = null;
            }
            var reqStr = getPartitionedItem('kimp_help_request');
            if (!reqStr) return;
            var req = JSON.parse(reqStr);
            
            req.status = "completed";
            setPartitionedItem('kimp_help_request', JSON.stringify(req));
            
            // 헬퍼 보너스 500원 즉시 가산
            var bonus = parseInt(getPartitionedItem('kimp_helper_bonus') || '0');
            bonus += 500;
            setPartitionedItem('kimp_helper_bonus', bonus);
            
            // 타임라인 로그 기록
            addTimelineLog(currentUserName + " 헬퍼님이 도움을 조기 완료했습니다. (도움 완료하여 500원의 보너스를 받았습니다.)");
            
            syncSalary();
            updateDashboard();
            window.dispatchEvent(new Event('storage'));

            // 도움 완료 알림창 발생
            alert("도움 완료하여 500원을 받았습니다.");
        }

        function openStatusPage() {
            window.open("kimp_status.html", "_blank");
        }

        function enterTaskWork() {
            // 헬퍼가 체험장으로 이동 시 현재 사용자 ID 사용 (하드코딩 금지)
            var helperUser = window.AuthManager ? window.AuthManager.getCurrentUser() : null;
            if (!helperUser) {
                try { helperUser = JSON.parse(sessionStorage.getItem('user')); } catch(e) {}
            }
            var helperId = helperUser ? (helperUser.id || helperUser.email || 'guest') : 'guest';
            setPartitionedItem('kimp_logged_in_user', helperId);
            window.location.href = "kimp_experience.html?t=" + Date.now();
        }

        // 이벤트 수신
        window.addEventListener('storage', function(e) {
            if (e.key === null) {
                alert("매니저가 세션을 초기화했습니다. 초기 화면으로 이동합니다.");
                window.location.reload();
                return;
            }
            if (e.key === window.getStorageKey('kimp_clock_hour') || e.key === window.getStorageKey('kimp_clock_minute') || e.key === window.getStorageKey('kimp_second_counter') || e.key === window.getStorageKey('kimp_remaining_seconds')) {
                syncClock();
            }
            if (e.key === window.getStorageKey('kimp_helper_base_salary') || e.key === window.getStorageKey('kimp_helper_bonus')) {
                syncSalary();
            }
            if (e.key === window.getStorageKey('kimp_help_request')) {
                updateDashboard();
            }
        });

        // 헬퍼 자동 출근 처리 (매니저 현황판 연동)
        function checkInHelper() {
            let progressMap = {};
            try {
                progressMap = JSON.parse(localStorage.getItem("kimp_workers_progress") || "{}");
            } catch(e) {}
            
            const helperId = window.AuthManager && window.AuthManager.getCurrentUser() ? window.AuthManager.getCurrentUser().id : "4";
            
            // 아직 출근 전이거나 checkInTime이 null인 경우에만 갱신
            if (progressMap[helperId] && !progressMap[helperId].checkInTime) {
                const now = new Date();
                let hours = String(now.getHours()).padStart(2, '0');
                let minutes = String(now.getMinutes()).padStart(2, '0');
                let seconds = String(now.getSeconds()).padStart(2, '0');
                const checkInTime = `${hours}:${minutes}:${seconds}`;
                
                progressMap[helperId].status = "active";
                progressMap[helperId].checkInTime = checkInTime;
                progressMap[helperId].location = "Task 3 (절임)";
                progressMap[helperId].stepName = "현장 헬퍼 지원";
                progressMap[helperId].currentStep = 6;
                progressMap[helperId].lastActiveTime = now.toISOString();
                
                localStorage.setItem("kimp_workers_progress", JSON.stringify(progressMap));
                
                // 헬퍼용 로컬 세션에도 반영
                setPartitionedItem('kimp_check_in_time', checkInTime);
            }
        }

        // 초기 구동
        checkInHelper();
        syncClock();
        syncSalary();
        updateDashboard();

        // 사용자 정보 배너 업데이트
        (function() {
            var userBadge = document.getElementById('logged-in-user-name');
            if (userBadge) {
                const currentHelperName = _helperSessionUser ? (_helperSessionUser.name || '헬퍼') : '헬퍼';
                userBadge.textContent = currentHelperName + ' (헬퍼)';
                var headerName = document.getElementById('header-helper-name');
                if (headerName) headerName.textContent = currentHelperName + ' 헬퍼';
            }

            var checkinBadge = document.getElementById('logged-in-checkin-time');
            if (checkinBadge) {
                var savedTime = getPartitionedItem('kimp_check_in_time');
                if (savedTime) {
                    checkinBadge.textContent = savedTime;
                } else {
                    checkinBadge.textContent = '15:00:15';
                }
            }
        })();

        // 1초 주기로 클락 재동기화 및 UI 갱신
        setInterval(function() {
            syncClock();
            syncSalary();
            if (typeof updateDashboard === 'function') {
                updateDashboard();
            }
        }, 1000);
    </script>
</body>
</html>
