<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/explore.css?v=1.0.2">
    <link rel="stylesheet" href="./css/explore2.css?v=1.0.2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>나의 활동 내역 | 스마트팩토리</title>
    <script src="./js/store.js" type="text/javascript"></script>
</head>

<body>
    <div class="header-wrap">
        <div class="header menu-bar mypage">
            <div class="chevron" onclick="window.history.back();" style="cursor: pointer;">
                <i class="bi bi-chevron-left back"></i>
            </div>
            <div class="title"><span>나의 활동 내역</span></div>
        </div>

        <div class="tabs">
            <ul class="tab-list">
                <li class="tab-item active" data-target="partner">파트너 등급</li>
                <li class="tab-item" data-target="reservation">예약 내역</li>
                <li class="tab-item" data-target="history">근로 이력</li>
                <li class="tab-item" data-target="shopping">나의 쇼핑</li>
            </ul>
        </div>
    </div>

    <div class="main-wrap">
        <main class="main">
            <div class="content-area">

                <section class="tab-content active" id="tab-partner">
                    <div class="sort-row">
                        <div class="sort-item sort-down">
                            <span class="lspace">최근 활동순</span>
                            <div class="sort-arrows">
                                <i class="bi bi-caret-up-fill"></i>
                                <i class="bi bi-caret-down-fill"></i>
                            </div>
                        </div>
                        <div class="sort-item">
                            <span class="lspace">근로시간순</span>
                            <div class="sort-arrows">
                                <i class="bi bi-caret-up-fill"></i>
                                <i class="bi bi-caret-down-fill"></i>
                            </div>
                        </div>
                    </div>
                    <div id="partner-container" style="margin-top: 47px;">
                    </div>
                </section>

                <section class="tab-content" id="tab-reservation">
                    <div class="sort-row">
                        <div class="sort-item sort-down" data-type="date" style="display:none;">
                            <span class="lspace">날짜</span>
                            
                        </div>
                        <div class="sort-item" data-type="pay" style="display:none;">
                            <span class="lspace">급여</span>
                             
                        </div>
                    </div>
                    <div id="reservation-container" style="margin-top: 42px;">
                    </div>
                </section>

                <section class="tab-content" id="tab-history">
                    <div class="sort-row">
                        <div class="sort-item sort-down" data-type="date">
                            <span class="lspace">날짜</span>
                            <div class="sort-arrows">
                                <i class="bi bi-caret-up-fill"></i>
                                <i class="bi bi-caret-down-fill"></i>
                            </div>
                        </div>
                        <div class="sort-item" data-type="pay">
                            <span class="lspace">급여</span>
                            <div class="sort-arrows">
                                <i class="bi bi-caret-up-fill"></i>
                                <i class="bi bi-caret-down-fill"></i>
                            </div>
                        </div>
                    </div>
                    <div id="history-container" style="margin-top: 42px;">
                    </div>
                </section>

                <section class="tab-content" id="tab-shopping">
                    <div class="sort-row">
                        <div class="sort-item sort-down" data-type="date">
                            <span class="lspace">날짜</span>
                            <div class="sort-arrows">
                                <i class="bi bi-caret-up-fill"></i>
                                <i class="bi bi-caret-down-fill"></i>
                            </div>
                        </div>
                        <div class="sort-item" data-type="like" style="display: inline-flex; align-items: center; gap: 4px; justify-content: center;">
                            <span class="lspace">좋아요</span>
                            <i class="bi bi-heart-fill" style="color: #ff3366; font-size: 12px; vertical-align: middle;"></i>
                        </div>
                    </div>
                    <div id="shopping-container" style="margin-top: 42px;">
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="./js/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            // URL 파라미터로 초기 탭 설정
            const urlParams = new URLSearchParams(window.location.search);
            const initialTab = urlParams.get('tab') || 'partner';

            let targetIndex = 0;
            if (initialTab === 'reservation') targetIndex = 1;
            if (initialTab === 'history') targetIndex = 2;
            if (initialTab === 'shopping') targetIndex = 3;

            $('.tab-item').removeClass('active');
            $('.tab-item').eq(targetIndex).addClass('active');
            $('.tab-content').removeClass('active').eq(targetIndex).addClass('active');

            // 탭 변경 이벤트
            $(document).on('click', '.tab-list .tab-item', function () {
                let currentIndex = $('.tab-list .tab-item.active').index();
                let newIndex = $(this).index();
                let moveDirection = newIndex > currentIndex ? 'move-next' : 'move-prev';

                $('.tab-item').removeClass('active');
                $(this).addClass('active');

                $('.tab-content').removeClass('active move-next move-prev');
                $('.tab-content').eq(newIndex).addClass('active ' + moveDirection);

                renderCurrentTab(newIndex);
            });

            // 전역 정렬 상태
            let currentSortType = initialTab === 'shopping' ? 'like' : 'date'; // 'date', 'pay', or 'like' (나의 쇼핑 탭은 기본적으로 좋아요 목록을 보여줌)
            let currentSortDir = 'desc';  // 'asc' or 'desc'

            // ★ 정렬 토글 기능 (오름차순/내림차순 / 필터)
            $(document).on('click', '.sort-item', function () {
                let $this = $(this);
                const $parentRow = $this.closest('.sort-row');
                $parentRow.find('.sort-item').not(this).removeClass('active sort-up sort-down');

                let selectedType = $this.attr('data-type') || ($this.find('.lspace').text().trim() === '날짜' ? 'date' : 'pay');

                if (currentSortType === selectedType) {
                    if (selectedType !== 'like') {
                        currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
                    }
                } else {
                    currentSortType = selectedType;
                    currentSortDir = 'desc';
                }

                $this.addClass('active');

                if (selectedType !== 'like') {
                    if (currentSortDir === 'asc') {
                        $this.removeClass('sort-down').addClass('sort-up');
                    } else {
                        $this.removeClass('sort-up').addClass('sort-down');
                    }
                }

                const activeIndex = $('.tab-list .tab-item.active').index();
                renderCurrentTab(activeIndex);
            });

            // 데이터 불러오기 유틸리티
            function getCurrentUser() {
                let userJson = sessionStorage.getItem("user");
                if (userJson) return JSON.parse(userJson);
                // AuthManager fallback
                if (window.AuthManager) return window.AuthManager.getCurrentUser();
                return { id: '2', name: '최수아', email: 'sua.choi@example.com' };
            }

            function getWorkerProfile(userName) {
                let profileStr = sessionStorage.getItem("kimp_worker_profile");
                if (profileStr) return JSON.parse(profileStr);
                // Mock fallback
                let hours = 22;
                if (userName === '최현일') hours = 150;
                else if (userName === '김영희') hours = 35;
                else if (userName === '김수민') hours = 5;
                return { workedHours: hours };
            }

            // 렌더링 함수
            function renderCurrentTab(index) {
                const user = getCurrentUser();

                if (index === 0) {
                    const profile = getWorkerProfile(user.name);
                    const hours = Math.floor(profile.workedHours || 0);
                    let label = '일반';
                    let badgeClass = 'badge01';
                    if (hours >= 120) {
                        label = '매니저';
                        badgeClass = 'badge03';
                    } else if (hours >= 30) {
                        label = '헬퍼';
                        badgeClass = 'badge02';
                    }

                    $('#partner-container').html(`
                        <div class="task-item">
                            <div class="task-items0">
                                <div class="task-items">
                                    <img class="icon" src="./images/k-icon_150x150.png" alt="icon"> 
                                    <div class="texts">
                                        <span>김치만들기</span> <span>AFood</span>
                                    </div>
                                </div>
                                <div class="task-info-right">
                                    <span class="box-time">${hours}h</span>
                                    <span class="${badgeClass}">${label}</span>
                                </div>
                            </div>
                        </div>
                    `);
                } else if (index === 1) {
                    let db = [];
                    try {
                        db = JSON.parse(localStorage.getItem('app_reservations_db') || '[]');
                    } catch (e) { }

                    const myReservations = db.filter(r => String(r.userId) === String(user.id) || r.userName === user.name);

                    if (myReservations.length === 0) {
                        $('#reservation-container').html(`
                            <div class="empty-state">
                                <i class="bi bi-calendar-x empty-state-icon" style="font-size: 40px; margin-bottom:10px;"></i>
                                <div>예약된 일정이 없습니다.</div>
                            </div>
                        `);
                    } else {
                        const slotLabels = ['10:00 ~ 12:00', '13:00 ~ 15:00', '15:00 ~ 17:00'];
                        let html = '';
                        myReservations.forEach(r => {
                            const parts = r.date.split('-');
                            let dayName = '';
                            if (parts.length === 3) {
                                const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                                const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
                                dayName = dayNames[d.getDay()];
                            }

                            const roleLabel = r.role === 'helper' ? '헬퍼' : (r.role === 'manager' ? '매니저' : '일반');
                            const badgeClass = r.role === 'helper' ? 'badge02' : (r.role === 'manager' ? 'badge03' : 'badge01');

                            let minimumWage = 10320;
                            let ratioVal = r.ratio ? Number(r.ratio) : 1.2;
                            let expectedPay = Math.floor(minimumWage * 2 * ratioVal);
                            const displayRatio = ratioVal.toFixed(1);

                            html += `
                                <div class="task-item" style="margin-bottom: 12px; display: block;">
                                    <div class="task-items0" style="align-items: center;">
                                        <div class="task-items" style="flex: 1.2;">
                                            <img class="icon" src="./images/k-icon_150x150.png" alt="icon"> 
                                            <div class="texts">
                                                <span>김치만들기</span>
                                                <span>AFood</span>
                                            </div>
                                        </div>
                                        <div class="task-info-center" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 0 5px;">
                                            <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 3px;">
                                                <span class="box-time">2h</span>
                                                <span class="${badgeClass}">${roleLabel}</span>
                                            </div>
                                            <span style="font-size: 11px; color: #a29bfe;">${slotLabels[r.slot]}</span>
                                        </div>
                                        <div class="task-info-col" style="flex: 1.5; display: flex; flex-direction: row; align-items: center; justify-content: flex-end; gap: 18px;">
                                            <span class="task-info-ratio" style="color: #a29bfe; font-weight: bold; font-size: 14px; white-space: nowrap;">
                                                ${displayRatio}x
                                            </span>
                                            <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center;">
                                                <span class="date-text" style="margin-bottom: 4px; font-size: 12px; color: #979797;">${parts[0]}.${parts[1]}.${parts[2]}</span>
                                                <span class="pay-text" style="color: #ccc; font-size:12px; white-space: nowrap;">예정 +₩ ${expectedPay.toLocaleString()}</span>  
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        $('#reservation-container').html(html);
                    }
                } else if (index === 2) {
                    function getHistoryData(userObj) {
                        const userId = userObj ? userObj.id : "guest";
                        try {
                            const localHistory = localStorage.getItem("mypage_history_" + userId);
                            if (localHistory) {
                                const parsed = JSON.parse(localHistory);
                                if (Array.isArray(parsed) && parsed.length > 0) {
                                    return parsed;
                                }
                            }
                        } catch (e) { }

                        const name = userObj ? userObj.name : "손님";
                        const today = new Date();
                        const formatDate = (daysAgo) => {
                            const d = new Date();
                            d.setDate(today.getDate() - daysAgo);
                            return d.getFullYear() + "." + String(d.getMonth() + 1).padStart(2, '0') + "." + String(d.getDate()).padStart(2, '0');
                        };
                        if (name === '최현일') {
                            return [
                                { id: 101, date: formatDate(1), time: "13:00 ~ 15:00", job: "지갑만들기", role: "매니저", pay: 220000, status: "완료" },
                                { id: 102, date: formatDate(3), time: "10:00 ~ 12:00", job: "우동만들기", role: "매니저", pay: 190000, status: "완료" },
                                { id: 103, date: formatDate(5), time: "15:00 ~ 17:00", job: "김치만들기", role: "매니저", pay: 180000, status: "완료" }
                            ];
                        } else if (name === '최수아') {
                            return [
                                { id: 201, date: formatDate(2), time: "13:00 ~ 15:00", job: "우동만들기", role: "헬퍼", pay: 110000, status: "완료" },
                                { id: 202, date: formatDate(6), time: "10:00 ~ 12:00", job: "지갑만들기", role: "일반", pay: 50000, status: "완료" },
                                { id: 203, date: formatDate(10), time: "15:00 ~ 17:00", job: "김치만들기", role: "일반", pay: 45000, status: "완료" }
                            ];
                        } else if (name === '김수민') {
                            return [
                                { id: 301, date: formatDate(4), time: "10:00 ~ 12:00", job: "우동만들기", role: "일반", pay: 45000, status: "완료" }
                            ];
                        } else if (name === '김영희') {
                            return [
                                { id: 401, date: formatDate(1), time: "13:00 ~ 15:00", job: "지갑만들기", role: "헬퍼", pay: 120000, status: "완료" },
                                { id: 402, date: formatDate(3), time: "10:00 ~ 12:00", job: "우동만들기", role: "헬퍼", pay: 110000, status: "완료" },
                                { id: 403, date: formatDate(8), time: "15:00 ~ 17:00", job: "김치만들기", role: "헬퍼", pay: 115000, status: "완료" }
                            ];
                        }
                        return [
                            { id: 999, date: formatDate(2), time: "10:00 ~ 12:00", job: "김치만들기", role: "일반", pay: 40000, status: "완료" }
                        ];
                    }

                    function parseDate(dateStr) {
                        if (!dateStr) return new Date(0);
                        if (dateStr.includes('년') && dateStr.includes('월')) {
                            const cleaned = dateStr.replace(/년|월|일/g, '').trim().split(/\s+/);
                            if (cleaned.length === 3) {
                                return new Date(parseInt(cleaned[0], 10), parseInt(cleaned[1], 10) - 1, parseInt(cleaned[2], 10));
                            }
                        }
                        const parts = dateStr.replace(/\./g, '-').split('-');
                        if (parts.length === 3) {
                            return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                        }
                        return new Date(dateStr);
                    }

                    function formatDisplayDate(dateStr) {
                        if (!dateStr) return '';
                        if (dateStr.includes('년') && dateStr.includes('월')) {
                            return dateStr.replace(/^\d+년\s*/, '');
                        }
                        const parts = dateStr.replace(/\./g, '-').split('-');
                        if (parts.length === 3) {
                            const month = parseInt(parts[1], 10);
                            const day = parseInt(parts[2], 10);
                            return `${month}월 ${day}일`;
                        }
                        return dateStr;
                    }

                    let historyData = getHistoryData(user);

                    historyData = [...historyData].sort((a, b) => {
                        let comparison = 0;
                        if (currentSortType === 'date') {
                            const dateA = parseDate(a.date);
                            const dateB = parseDate(b.date);
                            comparison = dateA - dateB;
                        } else if (currentSortType === 'pay') {
                            comparison = (a.pay || 0) - (b.pay || 0);
                        }

                        return currentSortDir === 'asc' ? comparison : -comparison;
                    });
                    let html = '';

                    historyData.forEach(h => {
                        let corpName = 'AFood';
                        let iconSrc = './images/k-icon_150x150.png';
                        if (h.job.includes('우동')) {
                            corpName = 'Uton';
                            iconSrc = './images/Uton_150x150.png';
                        } else if (h.job.includes('지갑')) {
                            corpName = 'Persa';
                            iconSrc = './images/fancy_150x150.png';
                        }

                        let badgeClass = 'badge01';
                        if (h.role === '매니저') badgeClass = 'badge03';
                        else if (h.role === '헬퍼') badgeClass = 'badge02';

                        let rawTime = h.time || h.slot || '10:00 ~ 12:00';
                        let displayTime = rawTime;

                        if (rawTime.includes('~')) {
                            // '~' 기준으로 출근/퇴근 시간 분리
                            let parts = rawTime.split('~');

                            // 각 시간의 ':'를 기준으로 쪼갠 뒤 시(0), 분(1)까지만 합침
                            let start = parts[0].trim().split(':').slice(0, 2).join(':');
                            let end = parts[1].trim().split(':').slice(0, 2).join(':');

                            displayTime = `${start} ~ ${end}`;
                        } else if (rawTime.includes(':')) {
                            // 단일 시간만 있는 경우 방어 코드
                            displayTime = rawTime.split(':').slice(0, 2).join(':');
                        }
                        

                        html += `
                        <div class="task-item" style="margin-bottom: 12px; cursor: pointer;" onclick="location.href='explore_detail.html?id=${h.id}'">
                            <div class="task-items0" style="align-items: center;">
                                <div class="task-items" style="flex: 1.2;">
                                    <img class="icon" src="${iconSrc}" alt="icon"> 
                                    <div class="texts">
                                        <span>${h.job}</span>
                                        <span>${corpName}</span> 
                                    </div>
                                </div>
                                <div class="task-info-center" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 0 5px;">
                                    <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 3px;">
                                        <span class="box-time">2h</span>
                                        <span class="${badgeClass}">${h.role}</span>
                                    </div>
                                    <span style="font-size: 11px; color: #a29bfe;">${displayTime}</span>
                                </div>
                                <div class="task-info-col" style="flex: 1.5; text-align: right; align-items: flex-end; display: flex; flex-direction: column;">
                                    <span class="date-text">${formatDisplayDate(h.date)}</span>
                                    <span class="pay-text">+₩ ${h.pay.toLocaleString()}</span>  
                                </div>
                            </div>
                        </div>`;
                    });

                    $('#history-container').html(html);
                } else if (index === 3) {
                    if (window.FactoryStore) {
                        window.FactoryStore.dispatch({ type: 'SYNC_FROM_STORAGE' });
                    }
                    const state = window.FactoryStore ? window.FactoryStore.getState() : { shopHistory: [], isLike: [] };
                    const container = $('#shopping-container');
                    container.empty();

                    // 정렬바 시각적 활성화 상태 동기화
                    const $sortRow = $('#tab-shopping .sort-row');
                    $sortRow.find('.sort-item').removeClass('active sort-up sort-down');
                    if (currentSortType === 'like') {
                        $sortRow.find('[data-type="like"]').addClass('active');
                    } else {
                        const $dateBtn = $sortRow.find('[data-type="date"]');
                        $dateBtn.addClass('active');
                        if (currentSortDir === 'asc') {
                            $dateBtn.addClass('sort-up');
                        } else {
                            $dateBtn.addClass('sort-down');
                        }
                    }

                    if (currentSortType === 'like') {
                        // 좋아요(관심상품) 필터 모드인 경우
                        const currentUserId = String(user.id);
                        const isLikeArr = state.isLike || [];
                        
                        // 현재 사용자의 관심 상품 레코드 필터링
                        const userLikes = isLikeArr.filter(r => String(r.userId) === String(currentUserId));

                        if (userLikes.length === 0) {
                            container.html(`
                                <div class="empty-state" style="padding: 40px 20px; text-align: center; color: var(--text-sub); font-size: 14px; background: rgba(0,0,0,0.2); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
                                    <i class="bi bi-heart" style="font-size: 40px; margin-bottom: 6px; color: var(--text-sub); opacity: 0.7;"></i>
                                    <div style="font-weight: bold;">관심 상품으로 등록된 상품이 없습니다</div>
                                </div>
                            `);
                            return;
                        }

                        const storeProducts = (window.MockData && window.MockData.storeProducts) || [];

                        let html = '';
                        userLikes.forEach(record => {
                            const pId = Number(record.productId);
                            const product = storeProducts.find(p => Number(p.productId) === pId) || { name: "상품 " + pId, price: 3000, img: "./images/udon_product.png", brand: "Uton", workId: 2 };
                            
                            html += `
                            <div class="task-item" onclick="location.href='./kimp_detail.html?productId=${product.productId}&workId=${product.workId}'" style="margin-bottom: 12px; cursor: pointer; padding: 14px; background: rgba(0, 0, 0, 0.2); border-radius: 12px; display: flex; align-items: center; justify-content: space-between;">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <img src="${product.img}" style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;" alt="product">
                                    <div style="text-align: left;">
                                        <div style="font-size: 11px; color: var(--text-sub);">${product.brand || 'Uton'}</div>
                                        <div style="font-size: 13px; font-weight: bold; color: var(--text-main);">${product.name}</div>
                                        <div style="font-size: 10px; color: #a29bfe; margin-top: 2px;">❤ 등록일: ${record.likedAt}</div>
                                    </div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <span style="font-size: 13px; font-weight: bold; color: var(--text-main);">₩ ${product.price.toLocaleString()}</span>
                                    <span style="color: #ff3366; font-size: 18px;"><i class="bi bi-heart-fill"></i></span>
                                </div>
                            </div>`;
                        });
                        container.html(html);
                    } else {
                        // 날짜별 주문이력 모드인 경우
                        const shopHistory = state.shopHistory || [];

                        if (shopHistory.length === 0) {
                            container.html(`
                                <div class="empty-state" style="padding: 40px 20px; text-align: center; color: var(--text-sub); font-size: 14px; background: rgba(0,0,0,0.2); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
                                    <i class="bi bi-bag-x" style="font-size: 40px; margin-bottom: 6px; color: var(--text-sub); opacity: 0.7;"></i>
                                    <div style="font-weight: bold;">아직 주문한 내역이 없습니다</div>
                                </div>
                            `);
                            return;
                        }

                        // 날짜 오름차순/내림차순 정렬 적용
                        let sortedHistory = [...shopHistory];
                        sortedHistory.sort((a, b) => {
                            const dateA = new Date((a.orderDate || '') + 'T' + (a.orderTime || '00:00:00'));
                            const dateB = new Date((b.orderDate || '') + 'T' + (b.orderTime || '00:00:00'));
                            return currentSortDir === 'asc' ? dateA - dateB : dateB - dateA;
                        });

                        let html = '';
                        sortedHistory.forEach(item => {
                            let statusTextHtml = "";
                            let btnHtml = "";

                            if (item.status === 'pending') {
                                statusTextHtml = `<div style="color: var(--text-main); font-weight: bold; font-size: 14px;">₩ ${item.price.toLocaleString()}</div>`;
                                btnHtml = `
                                <div style="margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end;">
                                    <button type="button" class="res-check-in-btn" style="background: var(--accent-secondary); color: #000; border: none; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer;" onclick="completeShopOrder('${item.id}')">🔔 알람 받기 (수령)</button>
                                    <button type="button" class="res-cancel-btn" style="background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 12px; font-size: 11px; cursor: pointer;" onclick="cancelShopOrder('${item.id}')">주문 취소</button>
                                </div>`;
                            } else if (item.status === 'cancelled') {
                                statusTextHtml = `<div style="color: var(--text-sub); font-size: 12px;">주문 취소</div>`;
                            } else if (item.status === 'completed') {
                                statusTextHtml = `<div style="color: var(--accent-pink); font-weight: bold; font-size: 14px;">-₩ ${item.price.toLocaleString()}</div>`;
                                btnHtml = `
                                <div style="margin-top: 8px; font-size: 11px; color: var(--accent-money); font-weight: bold; text-align: right;">
                                    <i class="bi bi-check-circle-fill"></i> 알람 확인 및 수령 완료
                                </div>`;
                            }

                            // 주문 상품에 따른 브랜드 이미지 아이콘 매핑
                            let iconHtml = `<span style="font-size: 24px;">🛍️</span>`;
                            const nameLower = (item.productName || '').toLowerCase();
                            const brandLower = (item.brandName || '').toLowerCase();
                            
                            if (nameLower.includes("우동") || nameLower.includes("비빔면") || brandLower === 'uton') {
                                iconHtml = `<img src="./images/Uton_150x150.png" style="width: 24px; height: 24px; border-radius: 6px; object-fit: cover;" alt="Uton">`;
                            } else if (nameLower.includes("김치") || brandLower === 'afood') {
                                iconHtml = `<img src="./images/k-icon_150x150.png" style="width: 24px; height: 24px; border-radius: 6px; object-fit: cover;" alt="AFood">`;
                            } else if (nameLower.includes("지갑") || brandLower === 'persa') {
                                iconHtml = `<img src="./images/fancy_150x150.png" style="width: 24px; height: 24px; border-radius: 6px; object-fit: cover;" alt="Persa">`;
                            }

                            html += `
                            <div class="task-item" style="margin-bottom: 12px; display: block; padding: 14px; border-left: 4px solid var(--accent-secondary); background: rgba(0, 0, 0, 0.2); border-radius: 12px;">
                                <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); margin-bottom: 8px;">
                                    <span>${item.dateStr} 주문</span>
                                    <span>주문번호: ${item.orderNo}번</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        ${iconHtml}
                                        <div style="text-align: left;">
                                            <div style="font-size: 11px; color: var(--text-sub);">${item.brandName || 'Uton'} (우동만들기)</div>
                                            <div style="font-size: 13px; font-weight: bold; color: var(--text-main);">우동만들기 [${item.productName}] (${item.qty}그릇)</div>
                                        </div>
                                    </div>
                                    ${statusTextHtml}
                                </div>
                                ${btnHtml}
                            </div>`;
                        });
                        container.html(html);
                    }
                }
            }

            // 초기 로딩 렌더링
            renderCurrentTab(targetIndex);
        });
    </script>
</body>

</html>
